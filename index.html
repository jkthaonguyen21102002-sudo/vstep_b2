<style>
:root{
  --ink:#13233F;
  --ink-soft:#46557A;
  --ink-faint:#8791A8;
  --paper:#FFFFFF;            /* nền trắng */
  --surface:#F5F8FD;         /* card: trắng ngả xanh rất nhạt */
  --line:#E2E8F4;
  --line-soft:#EEF2FA;
  --brand:#3E63DD;           /* chàm FinLens */
  --brand-2:#2E96B4;         /* xanh mòng két FinLens */
  --brand-grad:linear-gradient(100deg,#4263DD 0%,#2E96B4 100%);
  --mark:#C7E8F1;            /* highlighter on-brand (xanh nhạt) */
  --mark-deep:#2E96B4;
  --listen:#3E63DD;          /* Nghe — chàm thương hiệu */
  --speak:#6B57D6;           /* Nói — chàm tím */
  --read:#2E96B4;            /* Đọc — xanh mòng két thương hiệu */
  --write:#2C9B86;           /* Viết — xanh lục lam */
  --listen-soft:#E9EEFC;
  --speak-soft:#EDEAFA;
  --read-soft:#E4F3F8;
  --write-soft:#E3F4EF;
  --radius:18px;
  --shadow:0 1px 2px rgba(20,40,80,.05), 0 8px 28px rgba(20,40,80,.07);
  --shadow-lg:0 18px 50px rgba(28,60,120,.14);
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:84px}
body{
  margin:0;font-family:'Be Vietnam Pro',system-ui,sans-serif;
  background:var(--paper);color:var(--ink);
  line-height:1.65;-webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{line-height:1.18;margin:0;font-weight:800;letter-spacing:-.02em}
p{margin:0 0 .9em}
a{color:inherit}
.wrap{max-width:1080px;margin:0 auto;padding:0 22px}
.eyebrow{font-family:var(--mono);font-size:.72rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-faint)}
.mono{font-family:var(--mono)}

/* highlighter signature */
.mark{
  background:linear-gradient(120deg,transparent 0 2px,var(--mark) 2px 90%,transparent 90%);
  background-size:100% 60%;background-repeat:no-repeat;background-position:0 78%;
  padding:0 .08em;border-radius:1px;
}

/* ---------- NAV ---------- */
.nav{
  position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);
  backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line);
}
.nav-in{display:flex;align-items:center;gap:18px;height:64px}
.brand{display:flex;align-items:center;gap:11px;font-weight:800;letter-spacing:-.02em;white-space:nowrap}

  box-shadow:0 0 0 2px #fff,0 0 0 4px var(--brand-2),var(--shadow);position:relative;
}
.brand .badge.avatar::after{content:none}
.brand small{display:block;font-size:.66rem;font-weight:500;color:var(--ink-faint);letter-spacing:.04em}
.nav-links{display:flex;gap:4px;margin-left:auto;flex-wrap:wrap}
.nav-links a{
  text-decoration:none;font-size:.85rem;font-weight:600;color:var(--ink-soft);cursor:pointer;
  padding:7px 12px;border-radius:9px;transition:.18s;display:flex;align-items:center;gap:7px;
}
.nav-links a .dot{width:8px;height:8px;border-radius:50%;background:currentColor;opacity:.55}
.nav-links a:hover{background:var(--surface);color:var(--ink)}
.nav-links a.on{color:var(--ink);background:var(--surface);box-shadow:var(--shadow)}
.nav-links a.on{color:var(--ink);background:var(--surface);box-shadow:var(--shadow);position:relative}
.nav-links a[data-k].on{color:var(--c)}
.nav-links a.on::after{content:"";position:absolute;left:13px;right:13px;bottom:4px;height:2.5px;border-radius:3px;background:var(--c,var(--ink))}
.nav-links a[data-k]{--c:var(--ink)}
.nav-links a[data-k="nghe"]{--c:var(--listen)} .nav-links a[data-k="noi"]{--c:var(--speak)}
.nav-links a[data-k="doc"]{--c:var(--read)} .nav-links a[data-k="viet"]{--c:var(--write)}
.nav-links a.nav-vocab{--c:var(--brand)}
.nav-links a.nav-vocab.on{color:var(--brand)}
.blink-star{color:#F6B40A;font-size:.98em;display:inline-block;margin-right:5px;
  animation:starblink 1.1s steps(1,end) infinite;text-shadow:0 0 7px rgba(246,180,10,.6)}
@keyframes starblink{0%,55%{opacity:1;transform:scale(1)}56%,100%{opacity:.12;transform:scale(.82)}}
.nav-links a[data-k] .dot{background:var(--c);opacity:1}
a:focus-visible,button:focus-visible,.topic:focus-visible{outline:2.5px solid var(--ink);outline-offset:2px;border-radius:9px}
.nav-burger{display:none}

/* ---------- HERO ---------- */
.hero{padding:54px 0 28px;position:relative;overflow:hidden}
.hero-grid{display:grid;grid-template-columns:1.15fr .85fr;gap:40px;align-items:center}
.hello{font-family:var(--mono);font-size:.8rem;font-weight:700;letter-spacing:.04em;color:var(--speak)}
.hero h1{font-size:clamp(2.1rem,5vw,3.3rem);margin:.35em 0 .5em}
.hero h1 .b2{color:var(--mark-deep)}
.hero p.lead{font-size:1.08rem;color:var(--ink-soft);max-width:42ch}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;margin-top:22px}
.btn{
  text-decoration:none;font-weight:700;font-size:.92rem;padding:12px 20px;border-radius:12px;
  border:1.5px solid transparent;background:var(--brand-grad);color:#fff;transition:.18s;display:inline-flex;gap:8px;align-items:center;cursor:pointer
}
.btn:hover{transform:translateY(-2px)}
.btn.ghost{background:transparent;color:var(--ink);border-color:var(--line)}
.btn.ghost:hover{background:var(--surface);border-color:var(--brand)}

/* gauge card */
.gauge-card{background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:26px 26px 20px;box-shadow:var(--shadow-lg);text-align:center}
.gauge-card .eyebrow{margin-bottom:2px}
.gauge-wrap{position:relative;width:100%;max-width:300px;margin:6px auto 0}
.gauge-legend{display:flex;justify-content:center;gap:16px;margin-top:6px;flex-wrap:wrap}
.gauge-legend span{font-size:.74rem;font-weight:600;color:var(--ink-soft);display:flex;align-items:center;gap:6px}
.gauge-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.target-pill{
  margin-top:14px;display:inline-flex;align-items:center;gap:9px;background:var(--read-soft);
  color:var(--read);font-weight:700;font-size:.86rem;padding:8px 15px;border-radius:999px;
}

/* quick facts strip */
.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:40px}
.fact{background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow)}
.fact .n{font-family:var(--mono);font-weight:700;font-size:1.45rem;letter-spacing:-.02em}
.fact .l{font-size:.78rem;color:var(--ink-soft);font-weight:600;margin-top:2px}
.fact[data-k="nghe"] .n{color:var(--listen)} .fact[data-k="noi"] .n{color:var(--speak)}
.fact[data-k="doc"] .n{color:var(--read)} .fact[data-k="viet"] .n{color:var(--write)}

/* ---------- LỜI TẶNG (dedication) ---------- */
.dedication{position:relative;overflow:hidden;margin:6px 0 26px;padding:22px 26px;border-radius:20px;
  background:linear-gradient(105deg,rgba(66,99,221,.10),rgba(46,150,180,.13));
  border:1.5px solid var(--brand-2);box-shadow:var(--shadow-lg);
  display:flex;gap:18px;align-items:center}
.dedication::before{content:"";position:absolute;left:0;top:0;bottom:0;width:6px;background:var(--brand-grad)}
.dedication .heart{font-size:2.1rem;line-height:1;flex-shrink:0;filter:drop-shadow(0 2px 4px rgba(46,150,180,.3))}
.dedication .dtext{font-size:1.06rem;line-height:1.7;color:var(--ink);font-weight:600}
.dedication .dlead{font-size:1.18rem;font-weight:800}
.dedication .demph{color:var(--brand);font-weight:800;
  background:linear-gradient(transparent 62%,rgba(46,150,180,.28) 0);padding:0 2px}
.dedication .sign{display:block;margin-top:10px;font-family:var(--mono);font-weight:800;font-size:1.02rem;
  background:var(--brand-grad);-webkit-background-clip:text;background-clip:text;color:transparent}
@media (max-width:560px){.dedication{flex-direction:column;align-items:flex-start;gap:10px;padding:18px 20px}}

/* ---------- SECTIONS ---------- */
section{padding:64px 0;scroll-margin-top:80px}
.sec-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:30px}
.sec-tag{
  flex:none;width:54px;height:54px;border-radius:15px;display:grid;place-items:center;color:#fff;
  font-weight:800;font-size:1.5rem;box-shadow:var(--shadow)
}
.sec-head h2{font-size:clamp(1.6rem,3.4vw,2.2rem)}
.sec-head .eyebrow{margin-bottom:6px}
.sec-head p{color:var(--ink-soft);margin:6px 0 0;max-width:60ch}
.skill-nghe .sec-tag{background:var(--listen)} .skill-noi .sec-tag{background:var(--speak)}
.skill-doc .sec-tag{background:var(--read)} .skill-viet .sec-tag{background:var(--write)}
.skill-nghe{--c:var(--listen);--c-soft:var(--listen-soft)}
.skill-noi{--c:var(--speak);--c-soft:var(--speak-soft)}
.skill-doc{--c:var(--read);--c-soft:var(--read-soft)}
.skill-viet{--c:var(--write);--c-soft:var(--write-soft)}
.skill-section{border-top:1px solid var(--line)}

/* cards / grids */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:1fr 1fr}
.g3{grid-template-columns:repeat(3,1fr)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:22px;box-shadow:var(--shadow)}
.card h3{font-size:1.05rem;margin-bottom:8px;display:flex;align-items:center;gap:9px}
.card h4{font-size:.95rem;margin:14px 0 6px}
.card p,.card li{color:var(--ink-soft);font-size:.94rem}
.chip{display:inline-block;font-family:var(--mono);font-size:.7rem;font-weight:700;letter-spacing:.05em;
  padding:4px 9px;border-radius:7px;background:var(--c-soft,#eef);color:var(--c,var(--brand));text-transform:uppercase}

/* structure table */
.tbl{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
.tbl th,.tbl td{padding:13px 15px;text-align:left;font-size:.9rem;border-bottom:1px solid var(--line-soft);vertical-align:top}
.tbl th{background:var(--brand);color:#fff;font-weight:700;font-size:.8rem;letter-spacing:.02em}
.tbl td:first-child{font-weight:700}
.tbl tr:last-child td{border-bottom:none}
.tbl .sk{display:inline-flex;align-items:center;gap:8px}
.tbl .sk i{width:10px;height:10px;border-radius:3px}

/* accordion */
.acc{border:1px solid var(--line);border-radius:14px;background:var(--surface);overflow:hidden;margin-bottom:12px}
.acc>button{
  width:100%;text-align:left;background:none;border:none;cursor:pointer;font-family:inherit;
  padding:16px 18px;font-weight:700;font-size:.98rem;color:var(--ink);display:flex;align-items:center;gap:11px;
}
.acc>button .ic{margin-left:auto;transition:.25s;color:var(--ink-faint);font-size:1.2rem;line-height:1}
.acc>button .num{font-family:var(--mono);font-size:.78rem;font-weight:700;color:#fff;background:var(--c,var(--brand));
  width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none}
.acc.open>button .ic{transform:rotate(45deg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.acc-body-in{padding:0 18px 18px;color:var(--ink-soft);font-size:.94rem}
.acc-body-in .ex{background:var(--paper);border:1px dashed var(--line);border-radius:11px;padding:12px 14px;margin:10px 0}
.acc-body-in .ex b{color:var(--ink)}
.acc-body-in .vi{color:var(--ink-faint);font-style:italic;font-size:.88rem}

/* tip list */
.tips{list-style:none;padding:0;margin:0;display:grid;gap:11px}
.tips li{display:flex;gap:12px;align-items:flex-start;background:var(--surface);border:1px solid var(--line);border-radius:13px;padding:14px 16px;font-size:.92rem;color:var(--ink-soft)}
.tips li b{color:var(--ink)}
.tips li .k{flex:none;width:30px;height:30px;border-radius:9px;background:var(--c-soft);color:var(--c);
  display:grid;place-items:center;font-weight:800;font-family:var(--mono);font-size:.85rem}

/* timeline (speaking parts) */
.timeline{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.tl{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;position:relative;box-shadow:var(--shadow)}
.tl .p{font-family:var(--mono);font-weight:700;font-size:.74rem;color:var(--speak);letter-spacing:.06em}
.tl h4{font-size:1rem;margin:4px 0 8px}
.tl .meta{font-size:.78rem;color:var(--ink-faint);font-family:var(--mono);margin-bottom:8px}
.tl p{font-size:.88rem;color:var(--ink-soft);margin:0}

/* topic chips */
.topics{display:flex;flex-wrap:wrap;gap:9px;margin-top:6px}
.topic{cursor:pointer;border:1.5px solid var(--line);background:var(--surface);border-radius:11px;padding:9px 14px;
  font-weight:600;font-size:.88rem;color:var(--ink);transition:.16s;font-family:inherit}
.topic:hover{border-color:var(--speak);color:var(--speak)}
.topic.on{background:var(--speak);color:#fff;border-color:var(--speak)}
.topic-panel{margin-top:16px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)}
.topic-panel ol{margin:0;padding-left:20px}
.topic-panel li{margin:7px 0;color:var(--ink)}

/* reveal box (model answers / scripts) */
.reveal-btn{background:var(--c-soft);color:var(--c);border:none;font-family:inherit;font-weight:700;font-size:.84rem;
  padding:9px 15px;border-radius:10px;cursor:pointer;display:inline-flex;gap:7px;align-items:center;transition:.16s}
.reveal-btn:hover{filter:brightness(.97)}
.reveal-box{display:none;margin-top:14px;background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--c);
  border-radius:12px;padding:16px 18px}
.reveal-box.show{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(-4px)}to{opacity:1}}
.reveal-box .vi{color:var(--ink-faint);font-style:italic;font-size:.86rem;margin-top:4px}
.reveal-box .hl{color:var(--ink);font-weight:700}

/* QUIZ */
.quiz{background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:24px;box-shadow:var(--shadow)}
.quiz-head{display:flex;align-items:center;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.quiz-head h3{font-size:1.1rem}
.quiz-passage{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin:14px 0;font-size:.92rem;color:var(--ink-soft)}
.quiz-passage h4{color:var(--ink);margin-bottom:8px}
.quiz-passage .pn{font-family:var(--mono);font-size:.72rem;color:var(--c);font-weight:700}
.q{padding:16px 0;border-top:1px solid var(--line-soft)}
.q .qt{font-weight:700;font-size:.95rem;margin-bottom:10px}
.q .qt .qn{font-family:var(--mono);color:var(--c);margin-right:6px}
.opts{display:grid;gap:8px}
.opt{display:flex;gap:10px;align-items:flex-start;border:1.5px solid var(--line);border-radius:11px;padding:11px 13px;
  cursor:pointer;font-size:.9rem;transition:.14s;background:var(--surface)}
.opt:hover{border-color:var(--c)}
.opt .letter{flex:none;font-family:var(--mono);font-weight:700;font-size:.78rem;width:24px;height:24px;border-radius:7px;
  background:var(--paper);color:var(--ink-soft);display:grid;place-items:center;border:1px solid var(--line)}
.opt.sel{border-color:var(--c);background:var(--c-soft)}
.opt.sel .letter{background:var(--c);color:#fff;border-color:var(--c)}
.opt.correct{border-color:var(--read);background:var(--read-soft)}
.opt.correct .letter{background:var(--read);color:#fff;border-color:var(--read)}
.opt.wrong{border-color:var(--speak);background:var(--speak-soft)}
.opt.wrong .letter{background:var(--speak);color:#fff;border-color:var(--speak)}
.q .exp{display:none;margin-top:10px;font-size:.86rem;color:var(--ink-soft);background:var(--paper);border-radius:10px;padding:11px 13px;border-left:3px solid var(--c)}
.q .exp.show{display:block}
.q .exp b{color:var(--ink)}
.quiz-foot{display:flex;align-items:center;gap:16px;margin-top:18px;flex-wrap:wrap}
.score{font-family:var(--mono);font-weight:700;font-size:.92rem;padding:8px 14px;border-radius:10px;background:var(--paper);border:1px solid var(--line);display:none}
.score.show{display:inline-block}

/* footer */
footer{border-top:1px solid var(--line);padding:40px 0 56px;color:var(--ink-soft);font-size:.86rem}
footer .fgrid{display:flex;justify-content:space-between;gap:20px;flex-wrap:wrap;align-items:center}
.to-top{text-decoration:none;font-weight:700;color:var(--ink);cursor:pointer;display:inline-flex;gap:8px;align-items:center}

/* ---------- TEST DECK PICKER ---------- */
.deck-picker{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;margin:6px 0 4px}
.deck-card{text-align:left;border:1.5px solid var(--line);background:var(--surface);border-radius:14px;
  padding:15px 16px;cursor:pointer;font-family:inherit;transition:.16s;box-shadow:var(--shadow)}
.deck-card:hover{border-color:var(--c);transform:translateY(-2px)}
.deck-card.on{border-color:var(--c);background:var(--c-soft);box-shadow:0 0 0 3px var(--c-soft)}
.deck-card .dn{font-weight:800;font-size:.98rem;display:flex;align-items:center;gap:8px}
.deck-card .dn .tagfull{font-family:var(--mono);font-size:.6rem;font-weight:700;color:#fff;background:var(--c);
  padding:2px 6px;border-radius:5px;letter-spacing:.04em}
.deck-card .dm{font-size:.8rem;color:var(--ink-soft);margin-top:4px}
.test-section{margin:22px 0 4px}
.test-section-title{display:flex;align-items:center;gap:10px;font-weight:800;font-size:1.05rem;
  padding:10px 14px;background:var(--c);color:#fff;border-radius:11px;margin-bottom:6px}
.test-section-title .pn2{font-family:var(--mono);font-size:.72rem;background:rgba(255,255,255,.22);
  padding:2px 8px;border-radius:6px}

      <li><span class="k">1</span><span><b>Nhắm “điểm chắc” trước.</b> Nghe và Đọc là trắc nghiệm — luyện đúng dạng câu hỏi sẽ kéo điểm lên nhanh và ổn định nhất.</span></li>

      <div><div class="eyebrow">Kỹ năng 1 · Listening</div><h2>Nghe hiểu</h2>
      <p>3 phần, <b>35 câu</b>, làm trong khoảng 40 phút, mỗi đoạn chỉ phát <b>một lần</b>. Bài kiểm tra hai năng lực: nghe <b>thông tin chi tiết</b> và nghe <b>ý chính / mục đích / thái độ</b> của người nói.</p></div></div>

    <h3 style="margin-bottom:14px">Ba phần bài Nghe</h3>
    <div class="timeline" style="--c:var(--listen)">
      <div class="tl"><div class="p" style="color:var(--listen)">PART 1</div><h4>Thông báo & hướng dẫn</h4>
        <div class="meta">8 đoạn ngắn · 8 câu</div><p>Độc thoại rất ngắn: thông báo sân bay/loa phát thanh, lời nhắn thoại, hướng dẫn, dự báo thời tiết. Mỗi đoạn một câu hỏi độc lập.</p></div>
      <div class="tl"><div class="p" style="color:var(--listen)">PART 2</div><h4>Hội thoại</h4>
        <div class="meta">3 hội thoại · 4 câu/bài</div><p>Đoạn trao đổi giữa hai người (đồng nghiệp, bạn bè, khách – nhân viên). Câu hỏi đi theo trình tự bài nói.</p></div>
      <div class="tl"><div class="p" style="color:var(--listen)">PART 3</div><h4>Bài nói / bài giảng</h4>
        <div class="meta">3 bài nói · ~5 câu/bài</div><p>Độc thoại dài hơn: bài giảng, bài thuyết trình, giới thiệu chương trình. Cần theo dõi mạch ý và mục đích người nói.</p></div>
    </div>

    <h3 style="margin:28px 0 14px">Hai dạng câu hỏi cốt lõi</h3>
    <div class="grid g2">
      <div class="card" style="--c:var(--listen)">
        <h3><span class="chip">Dạng 1</span> Thông tin chi tiết</h3>
        <p>Hỏi con số, thời gian, địa điểm, lý do, ai làm gì. Đáp án nằm ở <b>một câu cụ thể</b> trong băng.</p>
        <p style="margin:0;color:var(--ink-faint);font-size:.86rem"><i>“What time… / How much… / Where… / Why did…”</i></p>
      </div>
      <div class="card" style="--c:var(--listen)">
        <h3><span class="chip">Dạng 2</span> Ý chính · mục đích · thái độ</h3>
        <p>Hỏi nội dung tổng quát, người nói muốn gì, cảm thấy thế nào. Phải tổng hợp <b>cả đoạn</b>, không bắt một từ.</p>
        <p style="margin:0;color:var(--ink-faint);font-size:.86rem"><i>“What is the speaker mainly… / How does she feel… / Why is he calling?”</i></p>
      </div>
    </div>

    <h3 style="margin:28px 0 14px">5 loại “bẫy” phổ biến — bấm để xem</h3>
    <div id="acc-nghe" style="--c:var(--listen)"></div>

    <h3 style="margin:28px 0 14px">Từ tín hiệu (signpost) cần bắt khi nghe</h3>
    <div style="overflow-x:auto">
    <table class="tbl">
      <tr><th>Quan hệ ý</th><th>Từ/cụm tín hiệu</th><th>Vì sao quan trọng</th></tr>
      <tr><td>Tương phản / đính chính</td><td>but, however, actually, in fact, instead, on the other hand</td><td>Báo hiệu thông tin <b>đúng</b> thường đứng ngay sau.</td></tr>
      <tr><td>Nguyên nhân – kết quả</td><td>because, since, due to, so, therefore, as a result</td><td>Hay là nội dung của câu hỏi “Why…?”.</td></tr>
      <tr><td>Bổ sung</td><td>also, in addition, what's more, besides, moreover</td><td>Báo có thêm một ý — dễ thành đáp án dạng “which is true?”.</td></tr>
      <tr><td>Trình tự / thay đổi</td><td>first, then, after that, originally… now…, used to</td><td>Phân biệt thông tin <b>cũ</b> và <b>mới</b> (bẫy thời gian).</td></tr>
      <tr><td>Quan điểm</td><td>I think, in my opinion, I'd rather, unfortunately, luckily</td><td>Chìa khoá cho câu hỏi thái độ / cảm xúc.</td></tr>
    </table>
    </div>

    <h3 style="margin:28px 0 14px">Mẹo phòng thi & ghi chú nhanh</h3>
    <ul class="tips">
      <li><span class="k">A</span><span><b>Đọc câu hỏi & gạch từ khoá trước khi nghe.</b> Biết trước cần “săn” con số, tên riêng hay lý do — bạn chỉ được nghe một lần.</span></li>
      <li><span class="k">B</span><span><b>Đề phòng “bẫy đính chính”.</b> Người nói nêu một thông tin rồi sửa lại (<i>“not… but actually…”, “I was going to… but…”</i>). Đáp án đúng là phần <b>sau</b> chỗ sửa.</span></li>
      <li><span class="k">C</span><span><b>Nghe ý, đừng bắt từng từ.</b> Đáp án diễn đạt lại (paraphrase) lời người nói. Nghe thấy y nguyên từ trong đề thường là… bẫy.</span></li>
      <li><span class="k">D</span><span><b>Ghi tốc ký.</b> Chỉ chép từ khoá, số, mũi tên: <span class="mono">mtg → Fri am</span>, <span class="mono">£20 not £12</span>. Đừng cố viết cả câu kẻo lỡ phần sau.</span></li>
      <li><span class="k">E</span><span><b>Lỡ một câu thì bỏ, sang câu kế.</b> Đừng để mất một câu kéo theo mất cả chuỗi. Còn dư thời gian cuối giờ mới đoán câu trống.</span></li>
    </ul>

    <h3 style="margin:30px 0 6px">📝 Bộ đề thi thử — chọn đề để giải</h3>
    <p style="color:var(--ink-soft);margin-bottom:12px">Chọn một bộ đề. Đề <b>Full</b> đủ 35 câu (Part 1·2·3) như đề thật; làm xong bấm <b>Nộp bài</b> để chấm điểm /10 và xem giải thích.</p>
    <div class="deck-picker" id="deck-nghe" style="--c:var(--listen);--c-soft:var(--listen-soft)"></div>
    <div class="test-mount" id="test-nghe" style="--c:var(--listen);--c-soft:var(--listen-soft)"></div>
  </div>
</section>

<section id="noi" data-tab="noi" class="skill-section skill-noi">
  <div class="wrap">
    <div class="sec-head"><div class="sec-tag">🎤</div>
      <div><div class="eyebrow">Kỹ năng 2 · Speaking</div><h2>Nói</h2>
      <p>Thi vấn đáp 12 phút, 3 phần. Giám khảo chấm theo 5 tiêu chí: từ vựng, ngữ pháp, phát âm, nội dung và độ liên kết.</p></div></div>

    <h3 style="margin-bottom:14px">Giám khảo chấm gì? · 5 tiêu chí</h3>
    <div class="grid g3" style="margin-bottom:6px">
      <div class="card" style="--c:var(--speak);padding:16px 18px"><h4 style="margin:0 0 4px">🗂️ Từ vựng</h4><p style="margin:0;font-size:.88rem">Dùng đa dạng, đúng chủ đề; tránh lặp một từ. Thay <i>good</i> bằng <i>beneficial, worthwhile…</i></p></div>
      <div class="card" style="--c:var(--speak);padding:16px 18px"><h4 style="margin:0 0 4px">🔧 Ngữ pháp</h4><p style="margin:0;font-size:.88rem">Linh hoạt câu đơn – ghép – phức; hạn chế lỗi thì, mạo từ, số ít/nhiều.</p></div>
      <div class="card" style="--c:var(--speak);padding:16px 18px"><h4 style="margin:0 0 4px">🔊 Phát âm</h4><p style="margin:0;font-size:.88rem">Rõ ràng, có trọng âm từ & câu, cố gắng nói có ngữ điệu lên–xuống.</p></div>
      <div class="card" style="--c:var(--speak);padding:16px 18px"><h4 style="margin:0 0 4px">💡 Nội dung</h4><p style="margin:0;font-size:.88rem">Trả lời đúng trọng tâm, mở rộng hợp lý bằng lý do & ví dụ; đủ độ dài.</p></div>
      <div class="card" style="--c:var(--speak);padding:16px 18px"><h4 style="margin:0 0 4px">🔗 Liên kết</h4><p style="margin:0;font-size:.88rem">Nối ý mạch lạc bằng liên từ (<i>besides, however, as a result…</i>).</p></div>
    </div>

    <h3 style="margin:28px 0 14px">Ba phần bài Nói</h3>
    <div class="timeline">
      <div class="tl"><div class="p">PART 1</div><h4>Tương tác xã hội</h4>
        <div class="meta">~3 phút · 2 chủ đề</div><p>Trả lời 3 câu hỏi/chủ đề. Trả lời tự nhiên, mở rộng bằng lý do và ví dụ.</p></div>
      <div class="tl"><div class="p">PART 2</div><h4>Thảo luận giải pháp</h4>
        <div class="meta">1′ chuẩn bị + 2′ nói</div><p>Một tình huống & 3 phương án. Chọn 1 phương án tốt nhất, nêu lợi ích và phản biện 2 phương án còn lại.</p></div>
      <div class="tl"><div class="p">PART 3</div><h4>Phát triển chủ đề</h4>
        <div class="meta">1′ chuẩn bị + 3′ nói</div><p>Nói về 1 chủ đề dựa trên 3 gợi ý cho sẵn (có thể thêm ý riêng), sau đó trả lời 1–3 câu hỏi nâng cao.</p></div>
    </div>

    <h3 style="margin:28px 0 14px">Mẹo & khung câu mẫu</h3>
    <div class="grid g2">
      <div class="card" style="--c:var(--speak)">
        <h3><span class="chip">Part 1</span> Trả lời tự nhiên</h3>
        <p>Đừng trả lời cụt. Mỗi câu nên có: <b>câu trả lời + lý do + ví dụ/giải thích</b>, nối ý bằng liên từ.</p>
        <div class="acc-body-in" style="padding:0">
          <div class="ex"><b>Khung:</b> “<span class="hl">I’d say…</span> because… For example/instance…”<br>
          <b>Mở rộng:</b> “<span class="hl">What’s more,</span> … which means that…”</div>
        </div>
      </div>
      <div class="card" style="--c:var(--speak)">
        <h3><span class="chip">Part 2</span> Dàn ý thảo luận giải pháp</h3>
        <p>Trước khi nói: chọn phương án <b>dễ nói nhất</b>, tìm 2 lợi ích cho nó và 1 bất lợi cho mỗi phương án còn lại.</p>
        ${reveal('Xem khung câu Part 2', `
          <p><b>Mở:</b> “I’m considering … among three options. From my perspective, <span class="hl">[A]</span> is the most ideal choice.”</p>
          <p><b>Thân:</b> “<span class="hl">In the first place,</span> [lý do 1]. <span class="hl">What’s more / Another benefit is that,</span> [lý do 2].”</p>
          <p><b>Phản biện:</b> “Next, I’ll explain why I don’t opt for the others. I don’t choose <span class="hl">[B]</span> because… <span class="hl">In addition,</span> [C] isn’t my alternative since…”</p>
          <p style="margin:0"><b>Kết:</b> “<span class="hl">All things considered,</span> I’d go for [A] for the above reasons.”</p>`)}
      </div>
    </div>

    <div class="card" style="--c:var(--speak);margin-top:16px">
      <h3><span class="chip">Part 3</span> Phát triển chủ đề bằng sơ đồ ý</h3>
      <p>Lấy <b>3 gợi ý + 1 ý của riêng mình</b> làm 4 nhánh; mỗi nhánh = một đoạn nhỏ (ý → lý do → ví dụ). Trước khi nói, nghĩ sẵn cách mở chủ đề bằng cấu trúc/từ ngữ khác để tránh lặp đề.</p>
      <div class="ex"><b>Ví dụ chủ đề:</b> “Reading habits should be encouraged among teenagers.” → các nhánh: <i>reduces stress · increases knowledge · improves memory · [ý của bạn]</i>.</div>

      <p style="margin:0;color:var(--ink-soft);font-size:.9rem"><span class="mono">it · its · this · that · these · those · they · them · their · who · which · one · ones · such · the former · the latter</span></p>

// quiz builder — kind: 'nghe' (per-question script) | 'read' | 'convo' | 'talk' (shared passage)
function buildQuiz(mountId, data, kind){
  const el=document.getElementById(mountId);
  if(!el) return;
  const letters=['A','B','C','D'];
  let head;
  if(kind==='nghe'){
    head = `<div class="quiz-head"><h3>🎧 Part 1 · Listening</h3><span class="chip">${data.items.length} câu</span></div>
       <p style="color:var(--ink-soft);font-size:.9rem">${data.intro}</p>`;
  } else {
    const icon = kind==='read' ? '📖' : '🎧';
    const number = kind==='read';
    head = `<div class="quiz-head"><h3>${icon} ${data.heading}</h3><span class="chip">${data.items.length} câu</span></div>
       <div class="quiz-passage">${data.passage.map((p,i)=>`<p>${number?`<span class="pn">[${i+1}]</span> `:''}${p}</p>`).join('')}</div>`;
  }

  const qs = data.items.map((it,qi)=>{
    const script = kind==='nghe' ? `<div class="quiz-passage" style="margin:0 0 12px">${it.script}</div>`:'';
    const tag = it.tag?`<span class="chip" style="margin-left:8px;font-size:.62rem">${it.tag}</span>`:'';
    const opts=it.opts.map((o,oi)=>`<div class="opt" data-qi="${qi}" data-oi="${oi}">
        <span class="letter">${letters[oi]}</span><span>${o}</span></div>`).join('');
    return `<div class="q" data-qi="${qi}">
      <div class="qt"><span class="qn">${qi+1}.</span>${it.q}${tag}</div>
      ${script}
      <div class="opts">${opts}</div>
      <div class="exp"><b>Giải thích:</b> ${it.exp}</div></div>`;
  }).join('');

  el.innerHTML = head + qs +
    `<div class="quiz-foot"><button class="btn" data-check>Kiểm tra đáp án</button>
       <button class="btn ghost" data-reset>Làm lại</button>
       <span class="score"></span></div>`;

  const chosen={};
  el.querySelectorAll('.opt').forEach(o=>{
    o.onclick=()=>{
      if(el.dataset.done) return;
      const qi=o.dataset.qi;
      el.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(x=>x.classList.remove('sel'));
      o.classList.add('sel'); chosen[qi]=+o.dataset.oi;
    };
  });

  el.querySelector('[data-check]').onclick=()=>{
    let correct=0;
    data.items.forEach((it,qi)=>{
      const sel=chosen[qi];
      el.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(op=>{
        const oi=+op.dataset.oi;
        op.classList.remove('sel');
        if(oi===it.ans) op.classList.add('correct');
        else if(oi===sel) op.classList.add('wrong');
      });
      el.querySelector(`.q[data-qi="${qi}"] .exp`).classList.add('show');
      if(sel===it.ans) correct++;
    });
    el.dataset.done='1';
    const sc=el.querySelector('.score');
    sc.classList.add('show');
    sc.textContent=`Đúng ${correct}/${data.items.length} · ${(correct/data.items.length*10).toFixed(1)}/10`;
    sc.style.color = correct/data.items.length>=0.6 ? 'var(--read)' : 'var(--speak)';
  };
  el.querySelector('[data-reset]').onclick=()=>{ buildQuiz(mountId,data,kind); };
}

function activateTab(tab, push=true){

  document.querySelectorAll('[data-tab]').forEach(el=>{

}

function buildSideNav(){
  const slug=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,24);
  document.querySelectorAll('section[data-tab]').forEach(sec=>{

    [...wrap.children].forEach((el,i)=>{
      if(el.classList && el.classList.contains('sec-head')){
        const h=el.querySelector('h2'); if(h){ if(!el.id) el.id=tab+'-top'; items.push({id:el.id,label:h.textContent.trim()}); }
      } else if(el.tagName==='H3'){
        const txt=el.textContent.trim();
        if(txt.length>2){ if(!el.id) el.id=tab+'-'+slug(txt)+'-'+i; items.push({id:el.id,label:txt}); }
      }
    });
    if(items.length<2) return;
    const content=document.createElement('div'); content.className='tab-content';
    while(wrap.firstChild) content.appendChild(wrap.firstChild);
    const aside=document.createElement('aside'); aside.className='side-toc';
    aside.innerHTML='<div class="side-title">Trong mục này</div>'+
      items.map(it=>`<a role="button" tabindex="0" data-tocid="${it.id}" title="${it.label.replace(/"/g,'')}">${tocLabel(it.label)}</a>`).join('');
    wrap.classList.add('has-side'); wrap.appendChild(aside); wrap.appendChild(content);

      a.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault(); goTo(a);}});
    });
  });
}

/* giới tính của nhân vật trong hội thoại (theo tên) */
const SPK_GENDER={lan:'f',linh:'f',mai:'f',ha:'f',hoa:'f',ximi:'f',huong:'f',ngoc:'f',thu:'f',trang:'f',receptionist:'f',woman:'f',clara:'f',susan:'f',dorothy:'f',
  minh:'m',tam:'m',nam:'m',binh:'m',quan:'m',tu:'m',duc:'m',tom:'m',hung:'m',long:'m',khanh:'m',customer:'m',man:'m',will:'m'};
function speakerGender(name){return SPK_GENDER[vDeaccent(name)]||'';}
const FEM_RE=/female|woman|zira|susan|samantha|karen|moira|tessa|fiona|serena|allison|ava|catherine|hazel|linda|heera|victoria|veena|kate|amy|emma|joanna|salli|kendra|aria|jenny|michelle|sonia|libby|google uk english female|google us english/i;
const MAL_RE=/male|david|mark|daniel|alex|fred|george|james|oliver|arthur|guy|eric|brian|ryan|matthew|joey|justin|ravi|rishi|liam|google uk english male/i;
function genderedVoices(g){
  const vs=enVoices();
  if(g==='f'){const f=vs.filter(v=>FEM_RE.test(v.name)); return f.length?f:vs;}
  if(g==='m'){const m=vs.filter(v=>MAL_RE.test(v.name)&&!/female/i.test(v.name)); return m.length?m:vs;}
  return vs;
}
function assignVoice(name, perG){
  const g=speakerGender(name);
  const pool=genderedVoices(g);
  const key=g||'x'; const i=perG[key]||0; perG[key]=i+1;
  const voice=pool.length? pool[i%pool.length] : ttsVoice;
  const base = g==='f'?1.18 : g==='m'?0.84 : 1.0;     // nữ cao hơn, nam trầm hơn
  const wobble=[0,0.1,-0.08,0.05,-0.05][i%5];          // hai người cùng giới vẫn khác nhau
  return {voice, pitch:Math.max(0.6,Math.min(1.8,base+wobble)), rate:0.95};
}
let curPlayBtn=null;
/* Đọc cả đoạn hội thoại: mỗi nhân vật (theo nhãn "Tên:") một giọng/cao độ riêng */
function speakPassage(sec, btn){
  if(!TTS) return;
  speechSynthesis.cancel();
  if(curPlayBtn) curPlayBtn.classList.remove('playing');
  if(btn){curPlayBtn=btn; btn.classList.add('playing');}
  const lines=sec.passage.map(stripTags).filter(l=>l && !/^Transcript/i.test(l));
  const map={}; const perG={}; let last=null;
  lines.forEach(line=>{
    let speaker='', text=line;
    const m=line.match(/^([^:]{1,28}):\s*(.+)$/);   // "Tên: lời thoại"
    if(m){ speaker=m[1].trim(); text=m[2].trim(); }
    if(!text) return;
    if(speaker && map[speaker]===undefined){ map[speaker]=assignVoice(speaker, perG); }
    const st = speaker? map[speaker] : {voice:ttsVoice, pitch:1, rate:0.95};
    const u=new SpeechSynthesisUtterance(text);
    if(st.voice) u.voice=st.voice;
    u.lang=(st.voice&&st.voice.lang)||'en-US'; u.pitch=st.pitch; u.rate=st.rate;
    last=u; speechSynthesis.speak(u);
  });
  if(btn){ if(last) last.onend=last.onerror=()=>btn.classList.remove('playing');
           else btn.classList.remove('playing'); }
}
function speak(text, btn){
  if(!TTS||!text) return;
  speechSynthesis.cancel();
  if(curPlayBtn) curPlayBtn.classList.remove('playing');
  const u=new SpeechSynthesisUtterance(text);
  if(ttsVoice) u.voice=ttsVoice;
  u.lang=(ttsVoice&&ttsVoice.lang)||'en-US'; u.rate=0.94; u.pitch=1;
  if(btn){curPlayBtn=btn; btn.classList.add('playing');
    u.onend=u.onerror=()=>btn.classList.remove('playing');}
  speechSynthesis.speak(u);
}
function stopSpeak(){ if(TTS) speechSynthesis.cancel(); if(curPlayBtn) curPlayBtn.classList.remove('playing'); }

/* ---------- MCQ test renderer (Listening / Reading) ---------- */
function fmtTime(s){const m=Math.floor(s/60);return (m<10?'0':'')+m+':'+((s%60)<10?'0':'')+(s%60);}

function renderMCQTest(mount, test){
  if(mount._timer){clearInterval(mount._timer); mount._timer=null;}
  stopSpeak();
  const L=['A','B','C','D']; const items=[];
  let h=`<div class="quiz">`;
  if(test.minutes) h+=`<div class="timerbar"><span class="tlabel">⏱️ Thời gian làm bài</span>
     <span class="tclock">${fmtTime(test.minutes*60)}</span>
     <span class="thint">Bài tự nộp khi hết giờ.<br>Đỏ = còn dưới 5 phút.</span></div>`;
  if(test.audio) h+=`<div class="audio-ctrl">
     <button class="btn ghost mini" data-hidetx>🙈 Ẩn lời thoại (nghe thật)</button>
     <span class="ahint">${TTS?'Lời thoại đang <b>ẩn</b> để bạn luyện nghe thật: bấm 🔊/nút phát ở mỗi phần để nghe, chọn đáp án, rồi bấm “Hiện lời thoại” (hoặc nộp bài) để đối chiếu.':'⚠️ Trình duyệt này chưa hỗ trợ giọng đọc — bấm “Hiện lời thoại” để đọc kịch bản.'}</span></div>`;
  h+=`<div class="quiz-head"><h3>${test.name}</h3><span class="chip">${test.meta}</span></div>`;
  h+=`<div class="results-mount"></div>`;
  const hasRec=test.sections.some(s=>s.audioSrc);   // đề có file ghi âm thật → không hiện nút TTS
  test.sections.forEach((sec,si)=>{
    const split=test.twoCol&&sec.type==='shared'&&sec.passage;
    const playSec=(test.audio&&!hasRec&&(sec.type==='shared'||sec.type==='mono')&&!sec.audioSrc)?`<button class="playbtn" data-play="${si}">🔊 Start Listening</button>`:'';
    h+=`<div class="test-section"><div class="test-section-title">${sec.title}${sec.count?`<span class="pn2">${sec.count}</span>`:''}${playSec}</div>`;
    if(sec.sub) h+=`<div class="test-section-sub">${sec.sub}</div>`;
    if(sec.audioSrc) h+=`<div class="rec-audio"><span class="rec-lbl">🔊 Start Listening</span><audio class="secaudio" controls preload="none" src="${sec.audioSrc}"></audio></div>`;
    if(!split&&sec.type==='shared'&&sec.passage)
      h+=`<div class="quiz-passage">${sec.passage.map((p,i)=>`<p>${sec.number?`<span class="pn">[${i+1}]</span> `:''}${p}</p>`).join('')}</div>`;
    h+=`</div>`;
    let itemsHTML='';
    sec.items.forEach((it,ii)=>{
      const qid=si+'-'+ii; items.push({qid,ans:it.ans,sec:sec.title}); const num=items.length;
      const playItem='';
      const script=(sec.type==='mono'&&it.script)?`<div class="quiz-passage" style="margin:0 0 10px">${it.script}</div>`:'';
      const tag=it.tag?`<span class="chip" style="margin-left:8px;font-size:.6rem">${it.tag}</span>`:'';
      itemsHTML+=`<div class="q" data-qid="${qid}"><div class="qt"><span class="qn">${num}.</span>${it.q}${tag}${playItem}</div>${script}
        <div class="opts">${it.opts.map((o,oi)=>`<div class="opt" data-qid="${qid}" data-oi="${oi}"><span class="letter">${L[oi]}</span><span>${o}</span></div>`).join('')}</div>
        <div class="exp"><b>Giải thích:</b> ${it.exp}</div></div>`;
    });
    if(split){
      h+=`<div class="split"><div class="split-passage"><div class="sp-tag">📖 Bài đọc — cuộn để đọc, luôn hiển thị khi trả lời</div>
        <div class="quiz-passage">${sec.passage.map((p,i)=>`<p>${sec.number?`<span class="pn">[${i+1}]</span> `:''}${p}</p>`).join('')}</div></div>
        <div class="split-q">${itemsHTML}</div></div>`;
    } else {
      h+=itemsHTML;
    }
  });
  h+=`<div class="test-foot"><button class="btn" data-submit>Nộp bài & chấm điểm</button><button class="btn ghost" data-reset>Làm lại</button><span class="scorebig"></span></div></div>`;
  mount.innerHTML=h;
  const chosen={};
  mount.querySelectorAll('.opt').forEach(o=>o.onclick=()=>{
    if(mount.dataset.done) return; const qid=o.dataset.qid;
    mount.querySelectorAll(`.opt[data-qid="${qid}"]`).forEach(x=>x.classList.remove('sel'));
    o.classList.add('sel'); chosen[qid]=+o.dataset.oi;
  });

  // audio (listening tests)
  let txHidden=false;
  function setTx(hide){
    txHidden=hide;
    mount.querySelectorAll('.quiz-passage').forEach(p=>p.style.display=hide?'none':'');
    const ht=mount.querySelector('[data-hidetx]');
    if(ht) ht.textContent=hide?'👁️ Hiện lời thoại':'🙈 Ẩn lời thoại (nghe thật)';
  }
  if(test.audio){
    mount.querySelectorAll('[data-play]').forEach(b=>b.onclick=()=>{
      const sec=test.sections[+b.dataset.play];
      // PART 1 (mono): đọc liền mạch cả 8 thông báo như một file nghe; các phần khác đọc cả đoạn hội thoại
      const secForPlay = sec.type==='mono' ? {passage: sec.items.map(it=>it.script||'').filter(Boolean)} : sec;
      speakPassage(secForPlay, b);
    });
    const ht=mount.querySelector('[data-hidetx]'); if(ht) ht.onclick=()=>setTx(!txHidden);
    setTx(true); // mặc định ẩn lời thoại — luyện nghe trước
  }

  function finish(auto){
    if(mount.dataset.done) return;
    mount.dataset.done='1';
    if(mount._timer){clearInterval(mount._timer); mount._timer=null;}
    const bar=mount.querySelector('.timerbar');
    if(bar){bar.classList.remove('low');bar.classList.add('done');
      bar.querySelector('.tclock').textContent=auto?'HẾT GIỜ':'ĐÃ NỘP';}
    if(test.audio) setTx(false); // hiện lại lời thoại để đối chiếu khi xem giải thích
    let correct=0, blank=0;
    const perSec={};
    test.sections.forEach(s=>perSec[s.title]={c:0,t:0});
    items.forEach(({qid,ans,sec})=>{
      perSec[sec].t++;
      const sel=chosen[qid];
      if(sel===undefined) blank++;
      mount.querySelectorAll(`.opt[data-qid="${qid}"]`).forEach(op=>{
        const oi=+op.dataset.oi; op.classList.remove('sel');
        if(oi===ans) op.classList.add('correct'); else if(oi===sel) op.classList.add('wrong');
      });
      mount.querySelector(`.q[data-qid="${qid}"] .exp`).classList.add('show');
      if(sel===ans){correct++; perSec[sec].c++;}
    });
    const total=items.length, score=correct/total*10;
    const band = score>=8.5?['C1','#3E63DD']: score>=6?['B2','#2E96B4']: score>=4?['B1','#d68a13']:['Dưới B1','#E0613E'];
    // results panel
    const rm=mount.querySelector('.results-mount');
    rm.innerHTML=`<div class="results">
      <h4>📊 Kết quả ${auto?'(tự nộp do hết giờ)':''}</h4>
      <div><span class="rscore">${score.toFixed(1)}/10</span>
        <span class="rband" style="background:${band[1]}22;color:${band[1]}">${band[0]}</span></div>
      <div style="font-size:.9rem;color:var(--ink-soft);margin-top:4px">Đúng <b>${correct}</b>/${total} câu · sai ${total-correct-blank} · bỏ trống ${blank}</div>
      <div class="rgrid">${test.sections.map(s=>`<div class="rcell">${s.title.replace(/·.*$/,'').trim()}<br><b>${perSec[s.title].c}/${perSec[s.title].t}</b></div>`).join('')}</div>
      <p class="rnote">📝 Cuộn xuống xem <b>giải thích chi tiết</b> từng câu (ô vàng). Đáp án đúng tô <span style="color:#2E96B4;font-weight:700">xanh</span>, đáp án bạn chọn sai tô <span style="color:#E0613E;font-weight:700">đỏ</span>.</p>
    </div>`;
    const sb=mount.querySelector('.scorebig'); sb.classList.add('show');
    sb.innerHTML=`Đúng ${correct}/${total} · <b>${score.toFixed(1)}/10</b> <span class="band" style="background:${band[1]}22;color:${band[1]}">${band[0]}</span>`;
    rm.scrollIntoView({behavior:'smooth',block:'center'});
  }

  mount.querySelector('[data-submit]').onclick=()=>finish(false);
  mount.querySelector('[data-reset]').onclick=()=>renderMCQTest(mount,test);

  // start countdown
  if(test.minutes){
    let secs=test.minutes*60;
    const bar=mount.querySelector('.timerbar'), clock=bar.querySelector('.tclock');
    mount._timer=setInterval(()=>{
      secs--; clock.textContent=fmtTime(Math.max(secs,0));
      if(secs<=300) bar.classList.add('low');
      if(secs<=0){ clearInterval(mount._timer); mount._timer=null; finish(true); }
    },1000);
  }
  mount.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ---------- simple practice timer (speaking/writing, no auto-submit) ---------- */
function startPracticeTimer(mount, minutes){
  if(mount._timer){clearInterval(mount._timer); mount._timer=null;}
  if(!minutes) return;
  let secs=minutes*60;
  const bar=mount.querySelector('.timerbar'); if(!bar) return;
  const clock=bar.querySelector('.tclock');
  mount._timer=setInterval(()=>{
    secs--; clock.textContent=fmtTime(Math.max(secs,0));
    if(secs<=120) bar.classList.add('low');
    if(secs<=0){clearInterval(mount._timer); mount._timer=null; bar.classList.remove('low'); bar.classList.add('done'); clock.textContent='HẾT GIỜ';}
  },1000);
}

/* ---------- speaking auto-grade (offline, from recognised transcript) ---------- */
const SPK_LINKERS=['however','therefore','moreover','furthermore','in addition','additionally','for example','for instance',
 'although','though','because','since','firstly','first of all','secondly','finally','in conclusion','to conclude',
 'to sum up','on the other hand','as a result','in contrast','besides','overall','whereas','despite','in spite of',
 'such as','as well as','not only','meanwhile','consequently','for this reason','what is more','in particular',
 'i think','in my opinion','from my point of view','to be honest','well','actually',
 'on the whole','in general','i believe','i would say','as i said','what i mean is','the thing is',
 'in fact','of course','obviously','personally','to start with'];
const SPK_FILLERS=['um','uh','er','erm','hmm','you know','i mean','kind of','sort of','like'];
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));}
function gradeSpeaking(text, seconds, kind){
  const t=(text||'').trim();
  const words=t.match(/[A-Za-z][A-Za-z'’-]*/g)||[];
  const wc=words.length;
  if(wc<15||seconds<8) return {tooShort:true, wc, seconds:Math.round(seconds)};
  const mins=Math.max(seconds/60,.05);
  const wpm=Math.round(wc/mins);
  const lower=' '+t.toLowerCase()+' ';
  const linkers=[...new Set(SPK_LINKERS.filter(l=>lower.includes(' '+l+' ')||lower.includes(' '+l+',')))];
  let fillers=0; SPK_FILLERS.forEach(f=>{const re=new RegExp('\\b'+f.replace(/ /g,'\\s+')+'\\b','g');const m=lower.match(re);if(m)fillers+=m.length;});
  const fillerRatio=wc?fillers/wc:0;
  const uniq=new Set(words.map(w=>w.toLowerCase())).size;
  const ttr=wc?uniq/wc:0;
  const tgt=kind==='part1'?{sec:40}:kind==='part3'?{sec:120}:{sec:90};
  const checks=[]; const tips=[]; let pts=0; const max=10;
  // 1. Thời lượng / lượng nói (0..3)
  let dp,dic,dm; const s=Math.round(seconds);
  if(seconds>=tgt.sec){dp=3;dic='✅';dm=`Nói ${s} giây — đủ dài cho phần này.`;}
  else if(seconds>=tgt.sec*0.6){dp=2;dic='⚠️';dm=`Nói ${s} giây — hơi ngắn, nên kéo dài tới ~${tgt.sec}s.`;tips.push('Phát triển thêm ý (ví dụ, lý do, trải nghiệm) để nói đủ thời lượng.');}
  else {dp=1;dic='⚠️';dm=`Chỉ ${s} giây — quá ngắn so với yêu cầu (~${tgt.sec}s).`;tips.push('Tập nói liên tục lâu hơn; mỗi ý nên có 2–3 câu mở rộng.');}
  pts+=dp; checks.push(['Thời lượng nói',dic,dm]);
  // 2. Trôi chảy / tốc độ (0..3)
  let fp,fic,fm;
  if(wpm>=100&&wpm<=165){fp=3;fic='✅';fm=`~${wpm} từ/phút — tốc độ tự nhiên, trôi chảy.`;}
  else if((wpm>=85&&wpm<100)||(wpm>165&&wpm<=185)){fp=2;fic='⚠️';fm=`~${wpm} từ/phút — ${wpm<100?'hơi chậm/ngập ngừng':'hơi nhanh'}.`;tips.push(wpm<100?'Giảm ngắt quãng; chuẩn bị ý trước khi nói để bớt ngập ngừng.':'Nói chậm lại một chút để rõ ràng và dễ nghe hơn.');}
  else {fp=1;fic='⚠️';fm=`~${wpm} từ/phút — ${wpm<85?'nói chậm/ngắt nhiều':'nói quá nhanh, dễ vấp'}.`;tips.push('Luyện nói thành câu hoàn chỉnh ở tốc độ ổn định.');}
  if(fillerRatio>0.06){fp=Math.max(0,fp-0.8);fic='⚠️';fm+=` Có nhiều từ đệm (${fillers}: um/uh/like…).`;tips.push('Giảm từ đệm “um, uh, like” — thay bằng một khoảng lặng ngắn.');}
  pts+=fp; checks.push(['Trôi chảy / tốc độ',fic,fm]);
  // 3. Vốn từ (0..2)
  let vp,vic,vm;
  if(ttr>=0.45){vp=2;vic='✅';vm=`Vốn từ đa dạng (độ phong phú ~${Math.round(ttr*100)}%).`;}
  else if(ttr>=0.36){vp=1.4;vic='⚠️';vm=`Từ vựng khá ổn (~${Math.round(ttr*100)}%) nhưng còn lặp.`;tips.push('Thay từ lặp bằng từ đồng nghĩa / collocation B2 (xem Ngân hàng từ vựng).');}
  else {vp=0.8;vic='⚠️';vm=`Từ vựng lặp nhiều (~${Math.round(ttr*100)}%).`;tips.push('Mở rộng vốn từ theo chủ đề; tránh lặp lại cùng một từ.');}
  pts+=vp; checks.push(['Vốn từ',vic,vm]);
  // 4. Liên kết (0..2)
  let cp,cic,cm;
  if(linkers.length>=5){cp=2;cic='✅';cm=`Liên kết tốt: ${linkers.slice(0,6).join(', ')}…`;}
  else if(linkers.length>=2){cp=1.3;cic='⚠️';cm=`Mới dùng ${linkers.length} từ nối (${linkers.join(', ')}).`;tips.push('Thêm từ nối khi nói: firstly, however, for example, as a result, to sum up…');}
  else {cp=0.4;cic='❌';cm='Hầu như chưa có từ nối — ý dễ rời rạc.';tips.push('Dùng từ nối để dẫn dắt ý: to begin with, in addition, on the other hand, in conclusion.');}
  pts+=cp; checks.push(['Liên kết ý',cic,cm]);
  const ratio=pts/max;
  let band;
  if(ratio>=0.85) band=['≈ B2–C1','#2E96B4'];
  else if(ratio>=0.68) band=['≈ B2','#2E96B4'];
  else if(ratio>=0.5) band=['≈ B1–B2','#d68a13'];
  else if(ratio>=0.34) band=['≈ B1','#d68a13'];
  else band=['≈ Dưới B1','#E0613E'];
  return {wc,seconds:s,wpm,fillers,linkers,ttrPct:Math.round(ttr*100),checks,tips,pts:pts.toFixed(1),max,ratio,band};
}
function renderSpeakGrade(box, text, seconds, kind){
  const r=gradeSpeaking(text,seconds,kind);
  if(r.tooShort){box.innerHTML=`<div class="wcard"><h4>🎙️ Chưa đủ để chấm</h4><p style="margin:0;color:var(--ink-soft)">Mình mới nghe được ${r.wc} từ trong ${r.seconds||0}s. Hãy nói dài hơn bằng tiếng Anh (ít nhất ~15–20 giây). Nếu phần lời nói nhận dạng bị trống: kiểm tra micro, dùng <b>Chrome/Edge</b>, và mở trang qua <b>https/localhost</b> (mở trực tiếp file đôi khi bị chặn micro).</p></div>`;return;}
  box.innerHTML=`<div class="wcard">
    <h4>🎙️ Chấm nói tự động (ước lượng) <span class="wband" style="background:${r.band[1]}22;color:${r.band[1]}">${r.band[0]}</span></h4>
    <div class="wmeter"><span style="width:${Math.round(r.ratio*100)}%"></span></div>
    <div style="font-size:.82rem;color:var(--ink-soft);margin-bottom:6px">Điểm trôi chảy/nội dung: <b>${r.pts}/${r.max}</b> · ${r.seconds}s · ${r.wc} từ · ~${r.wpm} từ/phút · ${r.linkers.length} từ nối${r.fillers?` · ${r.fillers} từ đệm`:''}</div>
    ${r.checks.map(([l,ic,m])=>`<div class="wcheck"><span class="ic">${ic}</span><span><span class="wlabel">${l}:</span> <span class="wmsg">${m}</span></span></div>`).join('')}
    ${r.tips.length?`<ul class="wtips">${r.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`:''}
    <div class="wdisc">⚠️ Máy chỉ ước lượng <b>độ trôi chảy, lượng nói, vốn từ và liên kết ý</b> từ phần lời nói được nhận dạng. <b>Phát âm, ngữ điệu và độ chính xác ngữ pháp KHÔNG được chấm tự động</b> — hãy <b>nghe lại bản ghi</b> và lý tưởng là nhờ thầy/cô đánh giá. Bộ nhận dạng cũng có thể nghe nhầm từ.</div>
  </div>`;
}
function overallSpeaking(results){
  const parts=[['part1','Part 1',0.2],['part2','Part 2',0.4],['part3','Part 3',0.4]];
  const done=parts.filter(([k])=>results[k]&&!results[k].tooShort);
  if(!done.length) return null;
  const wsum=done.reduce((a,[,,w])=>a+w,0);
  const ratio=done.reduce((a,[k,,w])=>a+results[k].ratio*w,0)/wsum;
  let band;
  if(ratio>=0.85) band=['≈ B2–C1','#2E96B4'];
  else if(ratio>=0.68) band=['≈ B2','#2E96B4'];
  else if(ratio>=0.5) band=['≈ B1–B2','#d68a13'];
  else if(ratio>=0.34) band=['≈ B1','#d68a13'];
  else band=['≈ Dưới B1','#E0613E'];
  const recap=parts.map(([k,name])=>({name, r:results[k]}));
  const allTips=[...new Set(done.flatMap(([k])=>results[k].tips))].slice(0,4);
  let comment;
  if(ratio>=0.68) comment='Bài nói nhìn chung trôi chảy và đủ ý — giữ phong độ này và chú ý phát âm để chắc chắn đạt B2.';
  else if(ratio>=0.5) comment='Đã ở ngưỡng B1–B2. Tập trung nói dài & liền mạch hơn, thêm từ nối và từ vựng đa dạng để vượt mốc B2.';
  else comment='Cần luyện nói liên tục lâu hơn, giảm ngắt quãng và bổ sung ý + từ nối. Hãy ghi lại nhiều lần để cải thiện.';
  return {ratio,score:(ratio*10).toFixed(1),band,recap,allTips,comment,doneCount:done.length};
}
function renderOverall(box, results){
  const o=overallSpeaking(results);
  if(!o){box.innerHTML=`<div class="wcard"><h4>📊 Chưa có phần nào được chấm</h4><p style="margin:0;color:var(--ink-soft)">Hãy ghi âm và chấm ít nhất một phần ở trên, rồi bấm “Chấm điểm tổng”.</p></div>`;return;}
  box.innerHTML=`<div class="wcard">
    <h4>📊 Điểm tổng kết (ước lượng) <span class="wband" style="background:${o.band[1]}22;color:${o.band[1]}">${o.band[0]}</span></h4>
    <div class="wmeter"><span style="width:${Math.round(o.ratio*100)}%"></span></div>
    <div style="font-size:.82rem;color:var(--ink-soft);margin-bottom:8px">Điểm trung bình có trọng số: <b>${o.score}/10</b> · dựa trên ${o.doneCount} phần đã chấm</div>
    <div class="rec-recap">${o.recap.map(({name,r})=>`<div class="rrow"><span class="rp">${name}</span>${r&&!r.tooShort?`<span class="wmsg">${r.seconds}s · ~${r.wpm} từ/phút · ${r.linkers.length} từ nối</span><span class="rb" style="background:${r.band[1]}22;color:${r.band[1]}">${r.band[0]}</span>`:`<span class="wmsg" style="color:var(--ink-faint)">chưa ghi</span>`}</div>`).join('')}</div>
    <p style="margin:10px 0 0;font-size:.92rem"><b>Nhận xét chung:</b> ${o.comment}</p>
    ${o.allTips.length?`<p style="margin:8px 0 2px;font-size:.88rem;font-weight:700">Ưu tiên cải thiện:</p><ul class="wtips">${o.allTips.map(t=>`<li>${t}</li>`).join('')}</ul>`:''}
    <div class="wdisc">⚠️ Điểm tổng là <b>ước lượng có trọng số</b> từ các phần đã chấm (Part 1·20% / Part 2·40% / Part 3·40%). Máy <b>không</b> chấm phát âm, ngữ điệu và độ chính xác ngữ pháp — hãy nghe lại bản ghi và nhờ thầy/cô đánh giá.</div>
  </div>`;
}
function mountRecorder(panel){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  const results={part1:null,part2:null,part3:null};
  const fmt=s=>{const m=Math.floor(s/60);return m+':'+((s%60)<10?'0':'')+(s%60);};
  const totalBox=panel.querySelector('[data-totalresult]');
  function wireRow(row){
    const kind=row.dataset.part;
    const recBtn=row.querySelector('[data-rec]'), stopBtn=row.querySelector('[data-stop]'),
          timeEl=row.querySelector('[data-time]'), txEl=row.querySelector('[data-transcript]'),
          resEl=row.querySelector('[data-result]'), audioEl=row.querySelector('[data-audio]'),
          clearBtn=row.querySelector('[data-clear]'), bandEl=row.querySelector('[data-pband]');
    function setBand(r){ if(!bandEl) return;
      if(r&&!r.tooShort){bandEl.textContent=r.band[0];bandEl.style.background=r.band[1]+'22';bandEl.style.color=r.band[1];bandEl.style.display='';}
      else bandEl.style.display='none'; }
    if(!SR){
      row.querySelector('.rec-controls').innerHTML=`<span class="rec-warn">Trình duyệt chưa hỗ trợ nhận dạng giọng nói — dùng <b>Chrome/Edge</b>. Hoặc gõ lại lời nói vào ô dưới, nhập số giây rồi bấm “Chấm”.</span>`;
      txEl.setAttribute('contenteditable','true'); txEl.innerHTML='';
      const bar=document.createElement('div'); bar.className='rec-manualbar';
      bar.innerHTML=`<span style="font-size:.85rem">Thời lượng (giây):</span><input type="number" min="5" value="${kind==='part1'?40:kind==='part3'?120:90}" data-secs><button class="btn mini grade" data-mgrade>✅ Chấm phần này</button>`;
      txEl.after(bar);
      bar.querySelector('[data-mgrade]').onclick=()=>{const r=gradeSpeaking(txEl.textContent,+bar.querySelector('[data-secs]').value||90,kind);results[kind]=r;renderSpeakGrade(resEl,txEl.textContent,+bar.querySelector('[data-secs]').value||90,kind);setBand(r);};
      return;
    }
    let recog=null, recording=false, finalText='', startT=0, timer=null, mr=null, chunks=[];
    function tick(){timeEl.textContent=fmt(Math.floor((Date.now()-startT)/1000));}
    function start(){
      finalText=''; resEl.innerHTML=''; audioEl.style.display='none'; results[kind]=null; setBand(null);
      txEl.innerHTML='<span class="interim"></span>';
      recog=new SR(); recog.lang='en-US'; recog.continuous=true; recog.interimResults=true;
      recog.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){const rr=e.results[i];if(rr.isFinal)finalText+=rr[0].transcript+' ';else interim+=rr[0].transcript;}
        txEl.innerHTML=esc(finalText)+'<span class="interim">'+esc(interim)+'</span>';};
      recog.onerror=e=>{if(e.error==='not-allowed'||e.error==='service-not-allowed'){stop(true);
        resEl.innerHTML=`<div class="rec-warn">Micro bị chặn. Hãy cho phép quyền micro, dùng Chrome/Edge và mở trang qua https hoặc localhost.</div>`;}};
      recog.onend=()=>{if(recording){try{recog.start();}catch(_){}}};
      try{recog.start();}catch(_){}
      if(navigator.mediaDevices&&navigator.mediaDevices.getUserMedia){
        navigator.mediaDevices.getUserMedia({audio:true}).then(st=>{chunks=[];
          try{mr=new MediaRecorder(st);}catch(_){return;}
          mr.ondataavailable=ev=>{if(ev.data.size)chunks.push(ev.data);};
          mr.onstop=()=>{if(chunks.length){audioEl.src=URL.createObjectURL(new Blob(chunks,{type:chunks[0].type||'audio/webm'}));audioEl.style.display='';}st.getTracks().forEach(t=>t.stop());};
          mr.start();}).catch(()=>{});
      }
      recording=true; startT=Date.now(); timer=setInterval(tick,250); tick();
      recBtn.disabled=true; stopBtn.disabled=false; timeEl.classList.add('live');
    }
    function stop(silent){
      if(!recording) return; recording=false; clearInterval(timer); timeEl.classList.remove('live');
      recBtn.disabled=false; stopBtn.disabled=true;
      const dur=(Date.now()-startT)/1000;
      if(recog){recog.onend=null;try{recog.stop();}catch(_){}}
      if(mr&&mr.state!=='inactive'){try{mr.stop();}catch(_){}}
      if(silent) return;
      setTimeout(()=>{const it=txEl.querySelector('.interim');if(it)it.remove();
        const text=finalText||txEl.textContent; const r=gradeSpeaking(text,dur,kind);
        results[kind]=r; renderSpeakGrade(resEl,text,dur,kind); setBand(r);},350);
    }
    recBtn.onclick=()=>start();
    stopBtn.onclick=()=>stop();
    if(clearBtn) clearBtn.onclick=()=>{results[kind]=null;finalText='';resEl.innerHTML='';audioEl.style.display='none';setBand(null);
      txEl.innerHTML='<span class="ph">Lời nói của bạn sẽ hiện ở đây…</span>';timeEl.textContent='0:00';};
  }
  panel.querySelectorAll('.rec-row').forEach(wireRow);
  const tb=panel.querySelector('[data-total]'); if(tb) tb.onclick=()=>renderOverall(totalBox, results);
}

/* ---------- writing auto-grade (offline heuristic) ---------- */
const WLINKERS=['however','therefore','moreover','furthermore','in addition','additionally','for example','for instance',
 'although','though','because','since','firstly','first of all','secondly','finally','in conclusion','to conclude',
 'to sum up','on the other hand','as a result','in contrast','besides','overall','whereas','despite','in spite of',
 'such as','as well as','not only','meanwhile','consequently','for this reason','what is more','in particular'];
function gradeWriting(text, kind){
  const t=(text||'').trim();
  const words=t.match(/[A-Za-z][A-Za-z'’-]*/g)||[];
  const wc=words.length;
  const sentences=t.split(/[.!?]+/).map(s=>s.trim()).filter(Boolean);
  const sc=sentences.length;
  const paras=t.split(/\n\s*\n+/).map(p=>p.trim()).filter(Boolean);
  const pc=paras.length||(t?1:0);
  const avgLen=sc?Math.round(wc/sc):0;
  const longS=sentences.filter(s=>(s.match(/[A-Za-z][A-Za-z'’-]*/g)||[]).length>40).length;
  const lower=' '+t.toLowerCase()+' ';
  const linkers=[...new Set(WLINKERS.filter(l=>lower.includes(' '+l+' ')||lower.includes(' '+l+',')))];
  const uniq=new Set(words.map(w=>w.toLowerCase())).size;
  const ttr=wc?uniq/wc:0;
  const tgt=kind==='letter'?{min:100,ideal:120,max:170,paras:2,link:3}:{min:220,ideal:250,max:330,paras:3,link:5};
  const checks=[]; let pts=0; const max=10; const tips=[];
  // 1. Length
  let lp,lm,lic;
  if(wc>=tgt.min&&wc<=tgt.max){lp=3;lic='✅';lm=`${wc} từ — đạt yêu cầu (mục tiêu ~${tgt.ideal}).`;}
  else if(wc<tgt.min){lp=wc>=tgt.min*0.7?1.5:0.5;lic='⚠️';lm=`${wc} từ — hơi ngắn, nên viết ít nhất ${tgt.min} từ.`;tips.push(`Viết thêm để đạt tối thiểu ${tgt.min} từ; bài quá ngắn bị trừ điểm Task.`);}
  else {lp=2;lic='⚠️';lm=`${wc} từ — hơi dài (trên ${tgt.max}); cô đọng lại để tránh lan man.`;tips.push('Cắt bớt ý lặp; giám khảo đánh giá chất lượng, không phải số lượng.');}
  pts+=lp; checks.push(['Độ dài',lic,lm]);
  // 2. Organisation (paragraphs)
  let op,oic,om;
  if(pc>=tgt.paras){op=2.5;oic='✅';om=`${pc} đoạn — bố cục rõ ràng.`;}
  else {op=1;oic='⚠️';om=`Chỉ ${pc} đoạn. ${kind==='letter'?'Thư nên có mở–thân–kết.':'Bài luận nên có mở bài, (các) thân bài và kết bài.'}`;tips.push('Tách bài thành các đoạn rõ ràng (cách nhau một dòng trống).');}
  pts+=op; checks.push(['Bố cục đoạn',oic,om]);
  // 3. Cohesive devices
  let cp,cic,cm;
  if(linkers.length>=tgt.link){cp=2.5;cic='✅';cm=`Dùng tốt ${linkers.length} từ nối: ${linkers.slice(0,6).join(', ')}…`;}
  else if(linkers.length>0){cp=1.3;cic='⚠️';cm=`Mới có ${linkers.length} từ nối (${linkers.join(', ')}). Nên dùng thêm.`;tips.push('Thêm từ nối: however, in addition, for example, as a result, in conclusion…');}
  else {cp=0;cic='❌';cm='Chưa thấy từ nối rõ ràng — ý dễ rời rạc.';tips.push('Dùng từ nối để liên kết ý: firstly, moreover, however, finally…');}
  pts+=cp; checks.push(['Liên kết (từ nối)',cic,cm]);
  // 4. Sentence control
  let sp,sic,sm;
  if(avgLen>=10&&avgLen<=22&&longS===0){sp=2;sic='✅';sm=`Câu dài trung bình ${avgLen} từ — cân đối.`;}
  else if(longS>0){sp=1;sic='⚠️';sm=`Có ${longS} câu quá dài (>40 từ) dễ sai ngữ pháp. TB ${avgLen} từ/câu.`;tips.push('Tách câu quá dài thành 2 câu ngắn để kiểm soát ngữ pháp.');}
  else {sp=1.2;sic='⚠️';sm=`Câu trung bình ${avgLen} từ — ${avgLen<10?'hơi ngắn/cộc, thử nối câu bằng although, because…':'kiểm tra lại độ dài.'}`;if(avgLen<10)tips.push('Kết hợp câu đơn thành câu phức (because, although, which…) để tăng điểm Ngữ pháp.');}
  pts+=sp; checks.push(['Kiểm soát câu',sic,sm]);
  // lexical note (no points, info)
  const ttrPct=Math.round(ttr*100);
  // band estimate
  const ratio=pts/max;
  let band;
  if(wc<25) band=['Chưa đủ để chấm','#E0613E'];
  else if(ratio>=0.85) band=['≈ B2–C1','#2E96B4'];
  else if(ratio>=0.68) band=['≈ B2','#2E96B4'];
  else if(ratio>=0.5) band=['≈ B1–B2','#d68a13'];
  else if(ratio>=0.34) band=['≈ B1','#d68a13'];
  else band=['≈ Dưới B1','#E0613E'];
  if(wc>=25 && wc<tgt.min*0.6) band=['≈ Dưới B1 (bài quá ngắn)','#E0613E']; // thiếu độ dài → không đạt yêu cầu
  return {wc,sc,pc,avgLen,linkers,ttrPct,checks,tips,pts:pts.toFixed(1),max,ratio,band};
}
function renderGrade(box, text, kind){
  const r=gradeWriting(text,kind);
  if(r.wc<5){box.innerHTML=`<div class="wcard"><h4>✍️ Hãy viết bài trước</h4><p style="margin:0;color:var(--ink-soft)">Nhập bài viết của bạn vào ô bên trên rồi bấm “Chấm tự động”.</p></div>`;return;}
  box.innerHTML=`<div class="wcard">
    <h4>📊 Chấm tự động (ước lượng) <span class="wband" style="background:${r.band[1]}22;color:${r.band[1]}">${r.band[0]}</span></h4>
    <div class="wmeter"><span style="width:${Math.round(r.ratio*100)}%"></span></div>
    <div style="font-size:.82rem;color:var(--ink-soft);margin-bottom:6px">Điểm cấu trúc: <b>${r.pts}/${r.max}</b> · ${r.wc} từ · ${r.sc} câu · ${r.pc} đoạn · độ phong phú từ ~${r.ttrPct}%</div>
    ${r.checks.map(([l,ic,m])=>`<div class="wcheck"><span class="ic">${ic}</span><span><span class="wlabel">${l}:</span> <span class="wmsg">${m}</span></span></div>`).join('')}
    ${r.tips.length?`<ul class="wtips">${r.tips.map(t=>`<li>${t}</li>`).join('')}</ul>`:''}
    <div class="wdisc">⚠️ Đây là <b>ước lượng tự động</b> dựa trên độ dài, bố cục, từ nối và cấu trúc câu — <b>không thay thế giám khảo</b>. Phần ngữ pháp & dùng từ tinh tế cần đối chiếu với <b>bài mẫu bên dưới</b> và 4 tiêu chí VSTEP (Hoàn thành yêu cầu · Tổ chức bài · Từ vựng · Ngữ pháp), hoặc nhờ thầy/cô chấm.</div>
  </div>`;
}

      <div class="prompt-box"><div class="ptask">${t.kind}</div><p style="margin:8px 0 0">${t.prompt}</p></div>
      <div class="write-ws" data-kind="${kind}">
        <textarea class="write-area" placeholder="Viết bài của bạn ở đây…"></textarea>
        <div class="write-bar">
          <span class="wcount">0 từ</span>
          <span class="wtarget">🎯 Mục tiêu: ${tgtTxt}</span>
          <button class="btn mini grade" data-grade>✅ Chấm tự động</button>
          <button class="btn ghost mini" data-clearw>Xoá</button>
        </div>
        <div class="write-result"></div>
      </div>
      <div style="margin-top:12px">${t.model}</div></div>`;
  });
  h+=`<div class="test-foot"><button class="btn ghost" data-reset>Làm lại / chọn đề khác</button></div></div>`;
  mount.innerHTML=h; wireReveals(mount);
  // wire each workspace
  mount.querySelectorAll('.write-ws').forEach(ws=>{
    const kind=ws.dataset.kind, ta=ws.querySelector('.write-area'),
          wc=ws.querySelector('.wcount'), box=ws.querySelector('.write-result');
    const tgt=kind==='letter'?{min:100,max:170}:{min:220,max:330};
    const upd=()=>{const n=(ta.value.match(/[A-Za-z][A-Za-z'’-]*/g)||[]).length;
      wc.textContent=n+' từ';
      wc.className='wcount '+(n===0?'':(n<tgt.min?'low':(n>tgt.max?'over':'ok')));};
    ta.addEventListener('input',upd); upd();
    ws.querySelector('[data-grade]').onclick=()=>renderGrade(box, ta.value, kind);
    ws.querySelector('[data-clearw]').onclick=()=>{ta.value='';upd();box.innerHTML='';ta.focus();};
  });
  const rb=mount.querySelector('[data-reset]'); if(rb) rb.onclick=()=>renderWritingTest(mount,test);
  startPracticeTimer(mount, test.minutes);
  mount.scrollIntoView({behavior:'smooth',block:'start'});
}

/* ---------- deck picker ---------- */
function initDeck(deckId, mountId, tests, renderer){
  const deck=document.getElementById(deckId), mount=document.getElementById(mountId);
  if(!deck||!mount) return;
  const wrap=mount.parentElement;
  const outerWrap=mount.closest('.wrap');
  // focus bar (back button) — separates theory/deck from the open test
  const bar=document.createElement('div');
  bar.className='focus-bar';
  bar.setAttribute('style',(mount.getAttribute('style')||'')+';display:none');
  bar.innerHTML=`<button class="backbtn" type="button">← Quay lại lý thuyết & danh sách đề</button><span class="focus-title"></span>`;
  wrap.insertBefore(bar, mount);
  let hidden=[];
  function enterFocus(name){
    hidden=[];
    [...wrap.children].forEach(ch=>{ if(ch!==mount&&ch!==bar&&getComputedStyle(ch).display!=='none'){ch.style.display='none';hidden.push(ch);} });
    bar.querySelector('.focus-title').textContent='Đang làm: '+name;
    bar.style.display=''; mount.classList.add('focused');
    if(outerWrap) outerWrap.classList.add('focusmode');
    requestAnimationFrame(()=>{const y=bar.getBoundingClientRect().top+window.scrollY-54;window.scrollTo({top:y,behavior:'smooth'});});
  }
  function exitFocus(){
    stopSpeak(); if(mount._timer){clearInterval(mount._timer);mount._timer=null;}
    hidden.forEach(ch=>ch.style.display=''); hidden=[];
    bar.style.display='none'; mount.classList.remove('focused');
    if(outerWrap) outerWrap.classList.remove('focusmode');
    mount.innerHTML=`<div class="test-empty">⬆️ Chọn một bộ đề ở trên để bắt đầu giải.</div>`;
    deck.querySelectorAll('.deck-card').forEach(x=>x.classList.remove('on'));
    requestAnimationFrame(()=>{const y=deck.getBoundingClientRect().top+window.scrollY-80;window.scrollTo({top:y,behavior:'smooth'});});
  }
  bar.querySelector('.backbtn').onclick=exitFocus;
  deck.innerHTML=tests.map((t,i)=>`<button class="deck-card" data-i="${i}">
     <div class="dn">${t.name}${t.full?'<span class="tagfull">FULL</span>':''}</div>
     <div class="dm">${t.meta}</div></button>`).join('');
  mount.innerHTML=`<div class="test-empty">⬆️ Chọn một bộ đề ở trên để bắt đầu giải.</div>`;
  deck.querySelectorAll('.deck-card').forEach(c=>c.onclick=()=>{
    deck.querySelectorAll('.deck-card').forEach(x=>x.classList.remove('on'));
    c.classList.add('on'); const t=tests[+c.dataset.i]; renderer(mount, t); enterFocus(t.name);
  });
}

/* ===========================================================
   SPEAKING — bộ đề (3 phần / đề)
   =========================================================== */
function spkP1(topic, qs){return `<div class="prompt-box" style="--c:var(--speak)"><div class="ptask">PART 1 · ${topic}</div>
  <ol style="margin:8px 0 0;padding-left:20px">${qs.map(q=>`<li style="margin:5px 0">${q}</li>`).join('')}</ol></div>`;}
function spkP2(situation, options, model){return `<div class="prompt-box" style="--c:var(--speak)"><div class="ptask">PART 2 · Thảo luận giải pháp</div>
  <p style="margin:8px 0 6px">${situation}</p>
  <p style="margin:0;font-size:.88rem;color:var(--ink-soft)"><b>3 lựa chọn:</b> ${options}</p></div>
  <div style="margin-top:8px">${reveal('Xem bài nói mẫu Part 2', model)}</div>`;}
function spkP3(topic, ideas, follows, model){return `<div class="prompt-box" style="--c:var(--speak)"><div class="ptask">PART 3 · Phát triển chủ đề</div>
  <p style="margin:8px 0 6px"><b>Topic:</b> ${topic}</p>
  <p style="margin:0 0 6px;font-size:.88rem"><b>Gợi ý:</b> ${ideas} <i>(+ ý của riêng bạn)</i></p>
  <p style="margin:0;font-size:.86rem;color:var(--ink-soft)"><b>Follow-up:</b> ${follows}</p></div>
  ${model?`<div style="margin-top:8px">${reveal('Xem bài nói mẫu Part 3', model)}</div>`:''}`;}

const L5_T3={title:`PART 3 · Talk 3`,count:`Q31–35`,type:`shared`,sub:`Bài giảng về những lỗi khoa học trong phim khoa học viễn tưởng.`,passage:[
 `Science fiction is very popular these days — in books, in movies, and in popular culture. But most science fiction is much more "fiction" and not so much "science." One of the most common problems is science fiction's fascination with faster-than-light travel.`,
 `We know that is impossible, as it violates Einstein's basic theory of space and time, but on Star Trek and other science fiction shows, spaceships jump from star to star and galaxy to galaxy like you or I might want to drive to another city. In truth, the closest star to Earth, Proxima Centauri, is over three light years away. That means, traveling at the speed of light — the fastest speed anyone theoretically could travel — it would take three years to make it to our nearest neighbor. Other stars and galaxies are routinely thousands and millions of light years away, making intergalactic travel an impossibility.`,
 `Even if we grant that such space travel somehow was possible, there is no shortage of other errors in popular science fiction. In Star Wars and other films, spaceships swoop across the screen, with their engines emitting a great roar. However, since space is a void, sound waves cannot travel. There is no sound in space; it is utterly silent. Gravity is another mystery in these films. Gravity depends mostly on mass. Spaceships are tiny compared to the mass of earth. In space there should be practically no gravity. And yet people in science fiction routinely walk around on their spaceships as comfortably as they would on earth.`,
 `That said, there have been a few, scarce films that bothered to portray the science of space flight somewhat realistically. In 2001: A Space Odyssey, the ship must rotate to create artificial gravity. Outside the spaceship, there is total silence. And the voyage from Earth to Jupiter takes many months. But such films are the exception, not the rule. While science fiction may be enjoyable, you should look elsewhere to learn about science.`
],items:[
 {q:`What is the professor mainly talking about?`,opts:[`The science of space travel`,`Scientific problems in Star Wars`,`The erroneous science in science fiction`,`Why science fiction is bad literature`],ans:2,exp:`Bàn về khoa học sai lệch trong sci-fi.`},
 {q:`According to the lecture, what is wrong with space travel in most science fiction?`,opts:[`There are no aliens in outer space.`,`There is no way to go faster than light speed.`,`There are many other stars and galaxies.`,`There is nowhere to go in outer space.`],ans:1,exp:`Không thể đi nhanh hơn ánh sáng.`},
 {q:`According to the professor, how long does it take to travel to the closest star to Earth?`,opts:[`Three light years`,`One hundred light years`,`Hundreds light years`,`A million light years`],ans:0,exp:`Proxima Centauri cách hơn ba năm ánh sáng.`},
 {q:`What does the professor NOT say about the movie 2001: A Space Odyssey?`,opts:[`It is exceptionally good.`,`It portrays gravity correctly.`,`It does not have faster-than-light travel.`,`It does not depict sound in space.`],ans:0,exp:`Ông không nói phim “xuất sắc”, chỉ khá chính xác.`},
 {q:`What can be inferred about science fiction?`,opts:[`Many people do not like watching science fiction.`,`It is costly to make science fiction.`,`Science fiction is not meant to teach us about science.`,`The film Space Odyssey is a famous science fiction.`],ans:2,exp:`“look elsewhere to learn about science.”`}

 `It takes a long time to raise a family of owlets, so the great horned owl begins early in the year. In January and February, or as late as March in the North, the male calls to the female with a resonant hoot. The female is larger than the male. She sometimes reaches a body length of twenty-two to twenty-four inches, with a wingspread up to fifty inches. To impress her, the male does a strange courtship dance. He bobs. He bows. He ruffles his feathers and hops around with an important air. He flutters from limb to limb and makes flying sorties into the air. Sometimes he returns with an offering of food. They share the repast, after which she joins the dance, hopping and bobbing about as though keeping time to the beat of an inner drum.`,
 `Owls are poor home builders. They prefer to nest in a large hollow in a tree or even to occupy the deserted nest of a hawk or crow. These structures are large and rough, built of sticks and bark and lined with leaves and feathers. Sometimes owls nest on a rocky ledge, or even on the bare ground.`,
 `The mother lays two or three round, dull white eggs. Then she stoically settles herself on the nest and spreads her feather skirts about her to protect her precious charges from snow and cold. It is five weeks before the first downy white owlet pecks its way out of the shell. As the young birds feather out, they look like wise old men with their wide eyes and quizzical expressions. They clamor for food and keep the parents busy supplying mice, squirrels, rabbits, crayfish, and beetles. Later in the season baby crows are taken. Migrating songsters, waterfowl, and game birds all fall prey to the hungry family. It is nearly ten weeks before fledglings leave the nest to search for their own food. The parent birds weary of family life by November and drive the young owls away to establish hunting ranges of their own.`

const R5_P2={title:`Passage 2 · The jump-off point for the West`,count:`Q11–20`,type:`shared`,number:true,passage:[
 `In the early 1800s, to reach the jump-off point for the West, a family from the East of the United States could either buy steamboat passage to Missouri for themselves, their wagons, and their livestock or — as happened more often — simply pile everything into a wagon. Along the macadamized roads and turnpikes east of the Missouri River, travel was comparatively fast, camping easy, and supplies plentiful. Then, in one river town or another, the neophyte emigrants would pause to lay in provisions. For outfitting purposes, the town of Independence had been preeminent ever since 1827, but the rising momentum of pioneer emigration had produced some rival jump-off points. Westport and Fort Leavenworth flourished a few miles upriver. St. Joseph had sprung up 55 miles to the northwest; in fact, emigrants who went to Missouri by riverboat could save four days on the trail by staying on the paddle-wheelers to St. Joe before striking overland.`,
 `At whatever jump-off point they chose, the emigrants studied guidebooks and directions, asked questions of others as green as themselves, and made their final decisions about outfitting. They had various, sometimes conflicting, options. For example, either pack animals or two-wheel carts or wagons could be used for the overland crossing. A family man usually chose the wagon. It was the costliest and slowest of the three, but it provided space and shelter for children and for a wife who likely as not was pregnant. Everybody knew that a top-heavy covered wagon might blow over in a prairie wind or be overturned by mountain rocks, that it might mire in river mud or sink to its hubs in desert sand — but maybe if those things happened on this trip, they would happen to someone else. Anyway, most pioneers, with their farm background, were used to wagons.`
