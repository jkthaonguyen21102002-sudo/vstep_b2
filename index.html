const R5_P3={title:`Passage 3 · The Royal Library of Alexandria`,count:`Q21–30`,type:`shared`,number:true,passage:[
 `Alexander the Great commissioned the city of Alexandria to create a Mediterranean stronghold in Egypt to rival Rome and cities in Greece. He died before his idea came to fruition, but his successors built it into one of the greatest cities of the Hellenistic world. The Royal Library of Alexandria has achieved an almost mythical status among scholars of classical studies. As with many ancient topics, scholarship on the matter often conflicts and relies heavily on hearsay and supposition. We will examine the importance of the library during its heyday and how it operated.`,
 `As with many ancient landmarks, there is much debate and controversy over Alexandria's library, especially regarding its destruction. The tale has been retold by countless historians and attributed to just as many different factions and rulers, not to profile this landmark of education, but as a tool for political slander. It is estimated that there are over 4000 writings regarding its destruction, yet very little data exists regarding the structure, layout, organization, administration, or whereabouts of the complex. The accuracy of the available information is suspect. However, 20th century scholars have reached some general consensus from the remaining sources.`,
 `Most historians have come to the conclusion that the original library (also known as the Temple of the Muses) was commissioned by Ptolemy I, Alexander's key general. More accurately, it was commissioned by the Athenian exile Demetrius of Phaleron under Ptolemy I's patronage. Traditionally it was attributed to his son Ptolemy II. However, it was later shown that Demetrius was antagonistic toward Ptolemy II and did not survive for much of his reign. Ptolemy I can be seen as responsible for the fruition and completion of the library and museum complex. H.G. Wells asserts that Ptolemy and his son encouraged 'a blaze of knowledge and discovery at Alexandria' through their funding of the library and other endowments.`,
 `The library itself was not a 'library' in the modern etymology. In fact, <b>the library was essentially a collection of scholars and scribes encouraged to expand scientific and philosophical wisdom and musings brought about because of the ambition and drive of Ptolemy I.</b> It was not the first institution of its type, developing about a half-century after Plato's Academy and Aristotle's Lyceum. About 30–50 scholars were probably permanently housed there, fed, and funded, first by the royal family, and later, according to an early Roman scroll, by public money. It served a religious, as well as an intellectual, function and it was the centerpiece of a so-called cult of the muses, governed by a priest.`,
 `[A] The library's output was created through observation and deduction in math, medicine, astronomy, and geometry, the editing of texts and manuscripts, and debating various advances in Western knowledge. [B] For two or three generations, the scientific output at Alexandria was considerably good. Its achievements included the introduction of the first steam engine, the first star map, and an astoundingly accurate estimate of the Earth's diameter. [C] Famous scholars employed there included Euclid, Eratosthenes, Apollonius, and Hero. [D]`,
 `The library may have consisted of a group of buildings, including lecture halls, study rooms, dining rooms, gardens, and an astronomical observatory. In organization of the library, it is believed that, in the time of Ptolemy II, the scrolls were haphazardly stored and grouped by general category. From the time of Callimachus onwards, they used an early iteration of a subject catalog. Subject divisions outlined by Callimachus included mathematics, medicine, astronomy, and geometry, as well as philology. At its peak, it is estimated about 600,000 scrolls were held within its walls, although that is likely an overstatement.`,
 `The Ptolemys achieved their goal of creating the largest collection of its kind by varied and often forceful means. At the time of its founding, Greek libraries were usually collections of manuscripts by private individuals. Ptolemy had a vision to collect all accepted literature on all matters scientific, philosophical and spiritual. The library tried to get copies of all known books and would send agents far and wide to acquire them. Ptolemy III wrote a letter "to all the world's sovereigns" asking to borrow their books. On more than a few occasions, scribes made copies and kept the originals. Supposedly, all ships entering Alexandria's harbor were searched for books to copy.`,
 `The Royal Library of Alexandria was created at an ideal time and place in world history. It was able to combine the deductive techniques of Greek thought toward the learning of other world cultures. As such, it holds a legendary position among historians as an important center of classical knowledge. Although much of the story has been buried with time and conflict, the importance and significance of its contributions are clear.`
],items:[
 {tag:`NOT`,q:`All of the following sentences express important ideas in the passage EXCEPT`,opts:[`The library was essentially a collection of scholars and scribes encouraged to expand scientific and philosophical wisdom.`,`In the time of Callimachus, the scrolls were haphazardly stored and grouped by general category.`,`It is estimated that there were over 4000 writings about its destruction, yet very little evidence exists.`,`The library tried to get copies of all known books and would employ several methods of acquiring them.`],ans:1,exp:`Việc cất trữ lộn xộn là thời Ptolemy II, không phải Callimachus.`},

const R5_P4={title:`Passage 4 · Pacific islands and the Bering Sea`,count:`Q31–40`,type:`shared`,number:true,passage:[
 `The Pacific Ocean contains approximately 20,000 to 30,000 islands. Islands, excluding Australia, that are south of the Tropic of Cancer are grouped into three divisions: Melanesia, Micronesia, and Polynesia.`,
 `Melanesia includes the nation of Papua New Guinea, provinces of Indonesia, and the Solomon Islands. Micronesia means 'small islands,' most of which are north of the equator. Finally, Polynesia, which means 'many islands,' includes the Hawaiian Islands, Tonga, Tuvalu, and Easter Island, among others. Migrants from South East Asian cities were the first settlers. The next wave of migrants populated New Guinea, gradually spreading to Fiji. The last of the Pacific islands to be settled was Polynesia. Hawaii was discovered sometime between the 7th and 13th centuries.`,
 `Bats were the only mammals on these islands until the arrival of the first humans. Birds adapted to environmental niches, like grazers and insectivores. Due to the cool and humid location, New Zealand developed a distinctive range of wildlife, and one large bird is thought to have suffered an extinction partly because it was intolerant of its climate. However, the extinction coincided with the arrival of the Melanesians, so it was probably caused by hunting and fires. Adding to that, mining and a natural drought destroyed a majority of the natural habitat. This was repeated on Easter Island, where early settlers wiped out 22 species of sea birds and land birds. By the time the Europeans had arrived, most of the plant life was extinct and nearly 30% of the forests were cleared.`,
 `The invasion of New Zealand by the Europeans resulted in a complete transformation of the island, importing over 3,198 species of plants and animals and filling most of the wetlands. Australia also imported animals and plants from many Pacific island countries. Sheep, pigs, goats and foxes were brought to Australia, which further disrupted the native ecosystems. Many plants and animals are presently endangered.`,
 `The plants and animals that inhabit Pacific islands are found nowhere else on earth. They are often adapted to specific habitats and live on a small part of a few islands. New Caledonia is an island that has been isolated from other lands for over 80 million years. 66 percent of the plant life there evolved on the island. Numerous plant species, unique in the world, are on a small area of one mountain and are represented by only a few specimens.`,
 `This varied genetic heritage is of such scientific importance that New Caledonia has been listed as one of the ten hot spots where the primary forest is in danger of extinction. It also boasts 68 species of bird; the most diverse bird life in the Southwest Pacific.`,
 `During the first Ice Age, ocean levels were much lower than they are at present. Levels in the shallow seas, now separating Asia from North America near the present-day Bering strait, dropped approximately 300 feet, creating 1,000 miles of grassland plain. Called the 'Bering Land Bridge,' this linked Asia and North America together. The Bering Sea has a long history of stable animal populations, despite the harsh environments, which sustain human life. Lemmings, ox, and mammoths all made the journey across the land bridge. Although mammoths have been extinct for quite a while now, the other two have remained.`,
 `Pacific walruses inhabit shallow waters of the Bering Sea during winter. They congregate to feed on clams, their principal food. [A] This type of feeding releases nutrients into the water, providing food for starfish and increasing the roughness of the sea floor. [B] Actual impact of the ecology of bottom communities is unknown, but <b>walruses, along with other animals like beavers and sea otters, have huge effects on the biological communities they occupy.</b> [C] Animals such as seals, bowhead whales, and walruses are important for the subsistence of their community. [D]`,
 `Pacific islands have the same pollution and over fishing problems as most countries. Destructive forms of fishing in Asian nations have taken their toll on marine animals such as birds and tuna. Many of these nations have now entered joint venture agreements to enable them to develop their marine resources more efficiently.`
],items:[

  prompt:'You live in Ho Chi Minh City and moved to Manchester to study English three months ago. You have just received an email from your friend Sara in London, who asks what Manchester and the weather are like, whether you still have your part-time job in a fast-food restaurant, about the family you are staying with, whether you go out much in the evening, and how your English classes are going. Write a reply to Sara covering all of these points. You should write at least 120 words.',
  model:reveal('Xem bài mẫu', `
   <p>Dear Sara,</p>
   <p>Manchester is a really interesting city. There are a lot of shops here. The people are friendly and the night life is fantastic. It's a pity it's always raining!</p>
   <p>As you know, I'm working in a fast-food restaurant. I go to work from 5 to 9 in the evening, so I don't go out with my friends very often. I go straight home after work to review the lessons and get ready for the class the next day. However, I love my job because I have lots of chances to practise speaking English with the customers. However, I don't like my boss because he's too strict.</p>

 {label:'Bài 2 · Viết luận',weight:'2/3 điểm',kind:'~250 từ · Advantages/Disadvantages',
  prompt:'In order to solve traffic problems, the Vietnamese government should tax private car owners heavily and use the money to improve public transportation. What are the advantages and disadvantages of such a solution? Give reasons for your answer and include any relevant examples from your own experience or knowledge. You should write at least 250 words.',
  model:reveal('Xem bài mẫu', `
   <p>Traffic congestion in many big cities of Viet Nam is getting more and more serious, and one suggested solution is to tax private car owners heavily and spend the money on making public transport better. However, there are both pros and cons to this idea.</p>
   <p>Let's begin with the positive aspects. One of the main advantages would be that the heavy taxes would discourage car owners from using their cars because it would become very expensive to drive. This would mean that they would begin to make use of public transport instead, thus reducing road accidents and pollution as well. Another good point is that public transport would be improved. In fact, public transport in major cities like Hanoi and Saigon is very poor; we often see old and dirty buses and trains that no one wants to ride. High taxes would create enough money to make the necessary changes.</p>
   <p>On the other hand, there are some negative points. First, this would be a heavy burden on car drivers, whose taxes are already high, leaving them with less money each month even though many have no choice but to drive every day. Another problem is that this type of tax would likely be set at a fixed amount for everyone. This would hit those with less money harder, while the rich could easily afford it, so it is not a fair tax.</p>
   <p>In conclusion, there are two sides to everything. Nevertheless, this measure would force us to do something to tackle traffic jams in big cities of Viet Nam, and it is therefore obviously worth considering. <i>(≈341 từ)</i></p>`)}
]};

const R6_P1={title:`Passage 1 · Food allergies`,count:`Q1–10`,type:`shared`,number:true,passage:[

 `Sometimes it's hard to figure out if you have a food allergy, since it can show up so many different ways. Your symptoms could be caused by many other problems. You may have rashes, hives, joint pains mimicking arthritis, headaches, irritability, or depression. The most common food allergies are to milk, eggs, seafood, wheat, nuts, seeds, chocolate, oranges, and tomatoes. Many of these allergies will not develop if these foods are not fed to an infant until her or his intestines mature at around seven months. Breast milk also tends to be protective.`,

const R6_P2={title:`Passage 2 · Women entrepreneurs`,count:`Q11–20`,type:`shared`,number:true,passage:[
 `Until recently, most American entrepreneurs were men. Discrimination against women in business, the demands of caring for families, and lack of business training had kept the number of women entrepreneurs small. Now, however, businesses owned by women account for more than $40 billion in annual revenues, and this figure is likely to continue rising throughout the 1990s. As Carolyn Doppelt Gray, an official of the Small Business Administration, has noted, "The 1970s was the decade of women entering management, and the 1980s turned out to be the decade of the woman entrepreneur."`,
 `What are some of the factors behind this trend? For one thing, as more women earn advanced degrees in business and enter the corporate world, they are finding obstacles. Women are still excluded from most executive suites. Charlotte Taylor, a management consultant, has noted, "In the 1970s women believed if they got an MBA and worked hard they could become chairman of the board. Now they've found out that isn't going to happen, so they go out on their own."`,
 `In the past, most women entrepreneurs worked in "women's" fields — cosmetics and clothing, for example. But this is changing. ASK Computer Systems, a $22-million-a-year computer software business, is one example. It was founded in 1973 by Sandra Kurtzig, who was then a housewife with degrees in math and engineering. When Kurtzig founded the business, her first product was software that let newspapers keep tabs on their orders. Her office was a bedroom at home, with a shoebox under the bed to hold the company's cash. After she succeeded with the newspaper software system, she hired several bright computer-science graduates to develop additional programs. When these were marketed and sold, ASK began to grow. It now has 200 employees, and Sandra Kurtzig owns $66.9 million of stock.`,
 `Of course, many women who start their own businesses fail, just as men often do. They still face hurdles in the business world, especially problems in raising money; the world of finance is still dominated by men, and old attitudes die hard. Most businesses owned by women are still quite small. But the situation is changing; there are likely to be many more Sandra Kurtzigs in the years ahead.`
],items:[

const R6_P3={title:`Passage 3 · Symbiosis`,count:`Q21–30`,type:`shared`,number:true,passage:[
 `Symbiosis is a close ecological relationship between two dissimilar organisms. They assist each other with feeding, defending, and reproducing. In symbiosis, at least one of the pair benefits from the relationship, while the other may be harmed (parasitism), may be relatively unaffected (commensalism), or may also benefit (mutualism).`,
 `An interesting mutually dependent relationship exists between the pine and the pinon jay. Blue pinon jays settle on the tops of pine trees and pick at the dark round seeds from the sticky cones. They store the seeds in their throats, fly off and hide them somewhere, and then return to repeat the process again. It seems the reproductive cycle of a pinon jay corresponds with the ripening of the pine's seed. Similarly, the pine is dependent on the pinon jays for distribution of the seeds. Using their long bills, pinon jays plant and store the seeds in the bark of a tree or in the ground for later consumption. Their throats can expand to hold a large number of seeds; one pinon jay has been reported carrying 50 seeds in one trip. After they have planted the seeds, they return to eat them. Using their bills like a woodpecker, they hammer the seed until the shell breaks. Any unrecovered nuts are then grown into new trees. This fascinating relationship has been ongoing for thousands of years.`,
 `When both species benefit each other, this is called mutualism. An example of mutualism is a plant and fungi. The fungus occupies the cortex cells of the secondary roots of the plant. This relationship, known as mycorrhiza, is beneficial because it helps the plant absorb water and phosphorus from the soil. Some fungi also produce antibiotics which may prevent the invasion of parasitic fungi and bacteria. Another example of mutualism is pollination. Bees carry pollen from one plant to the next when they seek out plants for nectar. They feed themselves on the nectar, and the plants reproduce after fertilization by the pollen from other plants.`,
 `Mutualism can also bring together two very different organisms, for example, a buffalo and an ox bird. These birds journey on the backs of African buffalo eating their parasites. The bird receives food, and the buffalo is rid of irritating insects. There are also a number of fish that provide an excellent example of mutualism. Known as 'cleaner fish,' these fish get rid of parasites and dead skin found on other fish. The best-known example is the 'cleaner wrasse,' which dwells in the Pacific and Indian oceans. They clean large predatory fish by eating tissue and parasites off their skin. This relationship provides food and protection for the wrasse and several health benefits for the other fish.`,
 `The other two types of symbiosis, besides mutualism, are commensalism and parasitism. [A] Commensalism refers to a symbiotic relationship where one organism eats the unused food of another. [B] One benefits, but the other is not affected. Examples include the remora and the shark. The remora attaches itself to the shark, and when the shark feeds itself, the remora picks up scraps. [C] One example of commensalism in humans is bacteria living in our intestines that feed on food in our gut. [D]`,
 `In parasitism, one organism benefits and the other is harmed. <b>Parasites live off the body of other organisms and receive nourishment from their tissues, while also inflicting damage on their hosts.</b> Plants are parasitized by bacteria, fungi, and a handful of other plants. Parasites cause harm by entering the tissue of the host for their own nutritional benefit.`,
 `None of these relationships are fixed, and it is likely that what starts as a parasitic relationship may gradually evolve into a mutualistic one. For example, in 1966, amebas were discovered that had become infected with bacteria. However, after five years, it was found that the core of the amebas had become dependent on the bacteria; thus, parasitism had evolved into mutualism. Unfortunately, the inverse is also possible; mutualistic associations may evolve into parasitic ones.`
],items:[
 {tag:`Chi tiết`,q:`According to paragraph 2, what does the pinon jay do for the pine tree?`,opts:[`It gives the tree important nutrition.`,`It provides a primary means of seed dissemination for pinon trees.`,`It keeps the tree free from parasites.`,`It helps the tree produce larger seeds.`],ans:1,exp:`Chim giúp phát tán hạt của cây thông.`},
 {tag:`Từ vựng`,q:`The word "corresponds with" in the passage is closest in meaning to`,opts:[`matches`,`includes`,`exposes`,`protects`],ans:0,exp:`“corresponds with” = trùng khớp/tương ứng.`},
 {tag:`Chi tiết`,q:`According to paragraph 2, how does the blue pinon jay store the seeds for later?`,opts:[`By holding up to 50 in its mouth`,`By burying them in the ground`,`By protecting them in its nest`,`By allowing them to develop into new trees`],ans:1,exp:`Chúng chôn hạt xuống đất hoặc giấu trong vỏ cây.`},
 {tag:`Tham chiếu`,q:`The word "It" in the passage refers to`,opts:[`bacteria`,`mutualism`,`mycorrhiza`,`fungus`],ans:2,exp:`“It helps the plant absorb water” → mối quan hệ mycorrhiza.`},
 {tag:`Chi tiết`,q:`According to paragraph 4, what is an example of a mutual relationship?`,opts:[`An animal eating parasites from another`,`An animal licking the body of another`,`An animal providing protection for another`,`An animal keeping another awake and alert`],ans:0,exp:`Chim ăn ký sinh trên lưng trâu.`},
 {tag:`Mục đích`,q:`The author mentions "the remora and the shark" in the passage in order to`,opts:[`explain the details behind a mutualist association`,`demonstrate a connection between an active parasite picker and host`,`show how one animal can benefit from the acts of another`,`give an example of one animal causing the suffering of another`],ans:1,exp:`Theo đáp án sách: B (ví dụ minh hoạ commensalism).`},

 {tag:`NOT`,q:`According to the passage, which of the following is NOT an example of mutualism?`,opts:[`A plant and its fungi`,`Pollen transfer from one plant to another`,`The remora and the shark`,`A buffalo and an ox bird`],ans:2,exp:`Remora–cá mập là commensalism, không phải mutualism.`},

const R6_P4={title:`Passage 4 · Earth's layers and seismic waves`,count:`Q31–40`,type:`shared`,number:true,passage:[
 `Earth has several distinct layers; the outermost of these is the crust, which is 30–40 km thick under the continents and 5–10 km in the ocean basins. The second layer is known as the mantle, which is about 2900 km thick, and divided into an upper and lower mantle. Most of Earth's internal heat is situated here. The upper mantle has an area known as the low-velocity zone, where secondary waves decrease rapidly and then gradually increase. The last layer is the core. This is a thick ball of iron and nickel divided into two layers, the inner core and the outer core.`,
 `The inner core is solid, whereas the outer core is so hot that the metal is always molten. However, because the force at the inner core is so immense, it cannot melt. Due to Earth's rotation, the outer core spins around the inner core, which causes the Earth's magnetism. The inner core consists of iron, nickel and other elements, probably a mix of carbon, oxygen, sulphur, silicon, and potassium. The temperature is extremely high, and due to pressure, the core is solid. Because the outer core is liquid, mainly consisting of iron, nickel and about 10% oxygen and sulphur, here the temperature is not as high.`,
 `The core is responsible for the Earth's magnetism, and it has a huge influence on Earth. Because it is so hot, it radiates a natural heat to the upper layers, setting off a current of heat, which in turn causes the movement of the tectonic plates. Because of Earth's rotation, the outer core spins, but the inner core does not because it is solid. This provides a sort of dynamo effect and causes the Earth's magnetic force.`,
 `A seismic wave is a wave that travels through Earth; it is often the result of a tectonic earthquake. There are two kinds of seismic waves, "body waves" and "surface waves." Other waves do exist, but are of little importance. Body waves travel through the center of Earth, following ray paths which are bent by the unstable density and stiffness of Earth's interior. These differ according to temperature, phase, and structure. Body waves send out the first tremors of an earthquake as well as any later ones.`,
 `There are two kinds of body waves, "primary" and "secondary" waves. Primary waves are compression waves, meaning the ground is alternately compressed and expanded in the direction of propagation. These waves can travel slightly faster through solids than secondary waves can, and are also able to travel through any type of material. Through air, they take the form of sound waves and so travel at the speed of sound.`,
 `Primary waves, when created by an earthquake, are less destructive than sound waves due to their minor amplitudes. Secondary waves are tilted waves; in other words, the ground is shifted in the direction of transmission. Secondary waves are only able to travel through solids, not liquids or gases, and thus are unable to travel through Earth's core. Primary waves are faster than secondary waves. Primary and secondary waves are usually produced by earthquakes and volcanoes. However, they can also be produced by people using explosives or large machinery.`,
 `Surface waves are comparable to water waves traveling just under Earth's surface. They travel at slower speeds than body waves. Surface waves can be the most devastating type of seismic wave due to their low frequency, long duration, and large amplitude. In theory, they are understood as a system which relates to primary and secondary waves.`,
 `[A] The moment an earthquake occurs, seismographs try to record its primary and secondary waves, but often they cannot detect the secondary waves of a distant earthquake. [B] <b>This may be due to the fact that secondary waves are unable to pass through liquids.</b> [C] This information about wave travel helps scientists determine the internal structure of the planet. [D]`
],items:[
 {tag:`Chi tiết`,q:`In paragraph 1, what does the author say about the presence of the low-velocity zone in the Earth's interior?`,opts:[`It causes the high-frequency stimulation.`,`Its width is consistent with the fault zone.`,`It induces regionally extensive oscillations.`,`It is located just above the lower crustal boundary.`],ans:2,exp:`Theo đáp án sách: C.`},
 {tag:`Từ vựng`,q:`The word "immense" in the passage is closest in meaning to`,opts:[`compressed`,`dilated`,`immeasurable`,`varied`],ans:2,exp:`“immense” = vô cùng lớn/không đo đếm được.`},

 {tag:`Chi tiết`,q:`According to paragraph 3, which of the following is the reason for tectonic plate movement?`,opts:[`The convection of heat from the core`,`The gravitational effect of the core`,`The powerful magnetic forces of the core`,`The spinning of the inner and outer core together`],ans:0,exp:`Nhiệt đối lưu từ lõi làm mảng kiến tạo dịch chuyển.`},
 {tag:`Mục đích`,q:`Why does the author mention "a tectonic earthquake" in the passage?`,opts:[`To show that primary waves are far more powerful than secondary waves`,`To demonstrate the effect of seismic waves on the Earth`,`To develop understanding of the structure of the Earth's interior`,`To explain that scientific detection methods are very efficient`],ans:1,exp:`Theo đáp án sách: B.`},
 {tag:`Từ vựng`,q:`The word "phase" in the passage is closest in meaning to`,opts:[`change`,`period`,`heat`,`construction`],ans:1,exp:`“phase” = giai đoạn/thời kỳ.`},
 {tag:`Từ vựng`,q:`The word "devastating" in the passage is closest in meaning to`,opts:[`faint`,`destructive`,`productive`,`quiet`],ans:1,exp:`“devastating” = có sức tàn phá (đáp án sách in nhầm là C).`},
 {tag:`Diễn giải`,q:`Which of the following best expresses the essential information in the highlighted sentence?`,opts:[`Although primary and secondary waves would be recorded, the secondary waves are not strong enough to be detected at a distance.`,`Seismic waves are too small to be felt as a noticeable earthquake, but detectable by seismographs.`,`Secondary waves can be generated as a result of nonlinear interaction, so seismographs cannot detect them.`,`Because of extensive fault repetition, the primary wave is the most powerful force in an earthquake.`],ans:0,exp:`Sóng thứ cấp không được ghi nhận ở khoảng cách xa.`},

const W6={id:'w6',name:'Đề 6',full:true,minutes:60,meta:'Thư (chuyến đi Hạ Long) + Luận (máy móc thay lao động)',tasks:[
 {label:'Bài 1 · Viết thư',weight:'1/3 điểm',kind:'~120 từ · email trả lời',
  prompt:'You live in Ho Chi Minh City. You just took a trip to Ha Long Bay with an English friend named Daisy. After returning to London she emailed you, saying she hopes you like the photos from Ha Long Bay, asking whether you got home all right, and suggesting another trip this spring if you have time and money — she asks for suggestions on where to go. Write a reply to Daisy: thank her, say you really like the photos and the time you spent together, describe a problem you had at the airport, and suggest a time and place for the next trip. You should write at least 120 words.',
  model:reveal('Xem bài mẫu', `
   <p>Dear Daisy,</p>
   <p>It's great to hear from you again. I hope everything is going well in London.</p>
   <p>Thanks for sending me the photos. I really like them because they remind me of the great time we spent with each other in Ha Long Bay. I believe that you enjoyed the breath-taking scenery here so much.</p>
   <p>As you probably know, I had a bit of trouble at Tan Son Nhat airport because of the accidental power-cut, but I got home safely in the end.</p>
   <p>I'm afraid I won't be able to get away this spring as I have to visit my grandparents in Central Vietnam then. What about a trip to Ha Noi, the capital city of Viet Nam, next summer? I will have graduated from university by next June, and I've got a whole month to travel before starting my first job.</p>
   <p>Well, that's all for now, Daisy. Drop me a line when you have time and let me know what you think about my plan.</p>
   <p style="margin:0">All the best,<br>(≈169 từ)</p>`)},
 {label:'Bài 2 · Viết luận',weight:'2/3 điểm',kind:'~250 từ · Problems/Solutions',
  prompt:'Recent advances in technology mean that the human workforce is gradually being replaced with machinery. What are some problems caused by this trend, and how could they be dealt with? Give reasons for your answer and include any relevant examples from your own experience or knowledge. You should write at least 250 words.',
  model:reveal('Xem bài mẫu', `
   <p>Technological advances in the past few decades help to gradually replace the human workforce with state-of-the-art machines in a wide range of industries. Although people can benefit a lot from the replacement, personally I think there are some drawbacks to this ongoing trend. This essay will examine the negative effects of the development of technology on human beings and then propose some solutions.</p>
   <p>One of the biggest problems is that there is less social interaction between workers, as they just focus on the machines they operate instead of communicating with their co-workers. The solution is for the board of directors to organise social activities such as team building, picnics at an amusement park, and staff parties on national holidays, so that workers have a chance to spend time together and share their experience.</p>
   <p>Another issue is that this trend has made workers lazier, because they are unwilling — and even refuse — to fulfil their task by hand when a technical problem like a breakdown or power cut occurs. To tackle this, the management and trainers should raise the workers' sense of responsibility to do their duty without the assistance of machinery when possible.</p>
   <p>Last but not least, this replacement may increase the unemployment rate, since machines perform faster and more efficiently. Dealing with this involves the government, local authorities and vocational schools launching training courses in which manual workers are trained to control modern machines and are encouraged to keep up with today's technology.</p>
   <p>All things considered, both the pros and cons are clear; with the above measures, factory management and vocational schools can make a great contribution to minimising the downsides. <i>(≈350 từ)</i></p>`)}
]};

const R7_P3={title:`Passage 3 · The origin of the Solar System`,count:`Q21–30`,type:`shared`,number:true,passage:[
 `The Solar System, as we know it, contains over 178 objects which revolve around our central star, or the Sun. Some of these objects can be seen from Earth with the unaided eye or an earth-based telescope, but the majority have only been detected through the development of instruments such as the Hubble Space Telescope, orbiting above Earth's atmosphere collecting information on the composition and behavior of objects in the Solar System, which has enabled researchers to hypothesize their origins.`,
 `[A] It is generally thought that a cloud of interstellar gas and dust, known as a 'nebula', was disturbed by some major event in space, possibly a supernova, about five billion years ago and began to collapse under its own gravity, forming a cloud. [B] The center of the cloud became so hot that it eventually exploded into a star with the cooler gases flowing around it. [C] In time, the gases condensed into dust, metals, and various kinds of ice in the cold outer reaches of space. [D] These solid particles collided with each other to form larger objects, or asteroids, as they continued to spin around our central star.`,
 `As these asteroids increased in size, their gravity began to pull in all the material in their immediate surroundings, and the largest of these went on to become planets. <b>The very different composition of the inner planets (Mercury, Venus, Earth and Mars) and the outer planets (Jupiter, Saturn, Neptune and Uranus) has led astronomers to hypothesize that their distances from the Sun caused them to develop at different rates and in different ways.</b> According to the most widely-held opinions, the planets closest to the Sun, where all the ice particles were vaporized due to the incredible heat, were formed mostly of rock, silicates, and metals with high melting points. These inner planets have thin atmospheres or none at all, and few, if any, satellites, which would indicate that most of the available material was either pulled into their own gravity or burned away in the heat of the Sun.`,
 `Between the inner and outer planets lies an asteroid belt, consisting of material that was not able to form into planets due to Jupiter's immense gravity. Beyond this area, four larger planets formed over a longer period of time in a far colder environment as material was thrown out from the center by the spinning star's centrifugal force. About a million years after the cooling of the original nebula, the Sun produced a strong solar wind which blew the remaining gases outwards, to be sucked in by the outer planets which became gas giants. These planets attracted many objects in their vast gravity fields, some of which are big enough to be termed 'satellites', and countless smaller fragments which formed rings around the planets.`,
 `The discovery of more objects in the Solar System in recent times has led to the need for further classification. Far beyond the outer planets lies Pluto, which was originally considered to be the ninth planet, but is now considered one of a pair of dwarf planets, the other being Charon. Pluto's origins may be in the recently discovered Kuiper Belt, the source of many of the comets which travel through the Solar System. This theory is based on Pluto's rock/ice composition, which is similar to that of a comet. Pluto/Charon was reclassified in 2006 as one of three dwarf planets discovered so far, the others being Eris and Ceres.`,
 `Scientific knowledge is only as good as the ability of scientists to collect evidence, so as new advances are made in astronomy, the present theories may be disproved, as in the case of Pluto. The above account represents the consensus of current opinions on the matter.`
],items:[

const R7_P4={title:`Passage 4 · Ocean energy`,count:`Q31–40`,type:`shared`,number:true,passage:[
 `Ocean Thermal Energy Conversion (OTEC) is a method of producing electricity developed from the temperature difference that subsists between deep and shallow waters. It converts solar radiation to electric power. The system uses the ocean's natural thermal gradient to direct a power-producing cycle. To produce a significant amount of power, the temperature between warm water on the surface and deep cold water should differ by about 20 degrees Celsius. On average, 23 million square miles of tropical seas absorb an amount of solar radiation equal in heat content to about 250 million barrels of oil. If less than one tenth of this could be converted into electric power, it would provide more than 20 times the total amount of electricity utilized in America on any given day.`,
 `Oceans are a huge renewable resource with the possibility of producing millions of watts of electric power. Some experts think the cold, deep seawater that is used in the OTEC process is rich in nutrients and, therefore, can be used to culture marine and plant life on shore or on land.`,
 `There are certain conditions which have to be met to enable OTEC to work. First, commercial OTEC facilities must be located in an environment that is stable enough for efficient system operation. This means that they must be built on land or submerged on the continental shelf. In addition, the natural ocean thermal gradient necessary for OTEC operation is generally found between latitudes 20° N and 20° S. The temperature of the surface water must differ from that of deep water, and allowances should be made for a wide-open space. Tropical islands meet the requirements for a wide space, so they are areas for OTEC development. Land-based facilities offer advantages. For example, plants do not require extensive maintenance, and they are protected from general bad weather. Land-based sites allow OTEC plants to function with related industries.`,
 `Thermal energy from the ocean was first proposed as far back as 1881. However, it wasn't until 1930 that a system was built, producing 22kw of electricity. Another was constructed sometime later, but it was destroyed by waves. In 1980, the U.S. department of energy built a site for OTEC heat exchangers on board a navy ship. Tests revealed that OTEC systems are able to function on slow-moving ships and are of little consequence to the surrounding marine environment.`,
 `In 1981, Japan established a closed-cycle plant in the Pacific Ocean, producing 40,000 watts of electricity. In May 1993, another 50,000 watts of electricity was produced. However, it was an impractical energy source as the materials used were expensive. Currently, scientists are continuing to develop more cost effective and open-cycle OTEC systems. <b>An integrated OTEC system can help create harmonious, self-sustaining island communities, independent of imported fossil fuels and their associated costs.</b>`,
 `Tidal energy is another form of ocean energy caused by the gravitational pull of the moon and sun, and the rotation of the Earth. When tides come into shore, they can be trapped in reservoirs behind dams. Then when the tide lowers, the water behind the dam can be released, functioning similarly to a hydroelectric power plant. Tidal dams can change the tidal level in the local basin, affecting navigation. The prime disadvantage is the effect a tidal station has on plants and animals. However, tidal fences, which are also used to channel the energy of tides, have less environmental impact than traditional sources of power such as fossil fuels or nuclear power, and are cheaper to install.`,
 `Turbines are devices with blades attached to a central rod that spin when a force hits the blades. [A] This spinning motion is extremely practical. The first turbine used was the undershot waterwheel, probably the oldest type of waterwheel, dating back over 2,000 years. [B] Waterwheels and windmills were the first turbines; their wooden blades captured the power of wind or rivers to lift water for irrigation or to rotate huge stones to grind grain. [C] It wasn't until the 1880s, when the generator was first invented, that people began using turbines to produce electricity. [D]`
],items:[

const W7={id:'w7',name:'Đề 7',full:true,minutes:60,meta:'Thư (bạn chuyển thành phố) + Luận (đồ ăn nhanh)',tasks:[
 {label:'Bài 1 · Viết thư',weight:'1/3 điểm',kind:'~120 từ · email trả lời',
  prompt:'Your English-speaking friend Clare has recently moved to another city. In her email she says she is getting used to her new life and has been very busy since moving, with all sorts of things happening; most of her things are still in bags and boxes; she is glad she moved because it is a really good city, though there are things and people she misses; and she invites you to come and stay with her in a couple of months once she settles down. Write a reply to Clare: ask her what is happening to her, ask her to describe her new home, ask her what and who she misses after moving there, and suggest a time when you can visit her. You should write at least 120 words.',
  model:reveal('Xem bài mẫu', `
   <p>Dear Clare,</p>
   <p>I was very happy to get your email yesterday and to know that you are getting used to your new life. Why don't you tell me why you have been so busy and what is going on there?</p>
   <p>How many bedrooms are there in your new house? Is there a garden in front? What do you like most about the house? Remember to send me some photos of it — I'd love to see them.</p>
   <p>You know, missing some things and people here after you have moved to a new place is a matter of course. However, I wonder who and what you miss. Do you miss me and the time we spent together?</p>
   <p>I can't wait to visit you there. What about next September? I have a week off then, so I can come and stay with you for a few days.</p>
   <p style="margin:0">Hope to hear from you soon. All the best, <i>(≈150 từ)</i></p>`)},
 {label:'Bài 2 · Viết luận',weight:'2/3 điểm',kind:'~250 từ · Opinion',
  prompt:'Some people argue that we have to think twice before deciding to eat fast food because of some health problems it may cause, while others believe that this kind of food is a good choice for those with a very busy life. Which opinion do you agree with? Use specific reasons and examples to support your answer. You should write at least 250 words.',
  model:reveal('Xem bài mẫu', `
   <p>In most parts of the world, including Vietnam, the popularity of fast food is growing at a considerable rate. Some people hold the view that fast food poses several health hazards to consumers. However, personally, I strongly believe that eating fast food is a great idea for busy people, for two following reasons.</p>
   <p>To begin with, most people, especially young adults, consider fast food a convenient source of food. In fact, fast food can be prepared and served within a very short time. One day, if you get stuck in a traffic jam and have no time to prepare dinner, you can just take the whole family straight to a KFC restaurant to eat some fried chicken with french fries. Obviously, the fast food industry helps to save people time.</p>
   <p>Another reason is that eaters can enjoy the pleasant atmosphere in an air-conditioned fast food restaurant, which is beautifully decorated with colourful lights, nice paintings and modern tables and chairs. You will definitely feel relaxed and comfortable after hard work while enjoying the good taste of hamburgers, hot dogs, pizzas, and so on.</p>
   <p>Turning to the other side of the argument, consuming too much fast food is a cause of obesity, diabetes, high blood pressure and heart disease, because this kind of food is rich in fat, salt, artificial substances and oils.</p>
   <p>All in all, I'm in favour of the idea that going to a fast food restaurant is a good choice when you are as busy as a bee. However, you should limit the amount of oily and salty fast food you consume. <i>(≈315 từ)</i></p>`)}
]};

const L8_T1={title:`PART 3 · Talk 1`,count:`Q21–25`,type:`shared`,sub:`Bài giảng về sự truyền nhiệt. (File nghe Part 3 gồm cả Q21–35.)`,audioSrc:`Audio/T4-PART3.mp3`,passage:[
 `All right. Today's lecture is about heat. Actually, we will talk about the ways heat moves. This is called heat transfer. Now, there are three types of heat transfer. They are called convection, conduction, and radiation. OK?`,
 `Convection happens when heat moves through gases and liquids. When air or water heat up, they get lighter. Then they move away from the heat and rise. When they get cooler, they change direction and come back down to the heat again. In convection, this repeats over and over. For example, a hot-air balloon: fire heats the air, the hot air becomes lighter, and the balloon rises up. But as the air cools, it gets heavier, so the balloon goes down. Convection is how hot-air balloons fly.`,
 `Now, next is conduction. This happens when heat moves through solids. A solid object is put on heat, and eventually the solid object takes this heat and gets hot. Some materials are very good at conduction — metals, for example. This is why many cooking pans are made of metal: they heat up quickly. But don't touch them. Ouch! Conduction causes many burns.`,
 `Finally, heat also moves by radiation. If you can feel heat from an object without touching it, then it is radiating heat. Remember, you can't see this heat. The sun, a toaster, a dryer — all these things use radiation. Have you ever warmed your hands by a fire? Even this is radiation. OK? Do we understand?`
],items:[
 {q:`What is the lecture mainly about?`,opts:[`What heat is`,`How heat transfers`,`The properties of heat`,`Heat in hot air balloons`],ans:1,exp:`Ba cách truyền nhiệt.`},
 {q:`What happens to a hot air balloon because of convection?`,opts:[`The balloon's air is heated.`,`The balloon becomes filled with gas.`,`The balloon goes up and goes down.`,`The balloon's flame gets hotter and hotter.`],ans:2,exp:`Khí nóng bay lên, nguội thì hạ xuống.`},
 {q:`What is the professor's opinion of the conduction?`,opts:[`He finds it easiest to teach by cooking.`,`He feels that it is good for making buildings.`,`He believes that it is useful for heating buildings.`,`He thinks many people get hurt from it.`],ans:3,exp:`“Conduction causes many burns.”`},
 {q:`Why does the professor mention a toaster?`,opts:[`To explain how toast is made by convection`,`To discuss how conduction makes toasters hot`,`To give an example of something that burns people.`,`To give an example of heat radiation`],ans:3,exp:`Máy nướng bánh là ví dụ về bức xạ nhiệt.`},
 {q:`What can be inferred from the lecturer?`,opts:[`Heat moving through solid materials is convection.`,`Convection is not a pattern that repeats.`,`Heat cannot move through solid materials.`,`Some materials are better at conducting heat than others.`],ans:3,exp:`Kim loại dẫn nhiệt tốt hơn vật liệu khác.`}
]};

 `OK. So, Impressionism was a new way of painting. It went against old art standards. It changed what was seen as good art. Before it, art was considered good if it was exact. Artists tried to reproduce what they saw on the canvas. They aimed to make the painting look just like what they could see.`,
 `Impressionist painters were different. The first thing you will notice in an Impressionist painting is the use of color. These artists didn't mix colors. They put two colors side by side. They knew the eyes would blend the colors for them. The purpose was to create bright and bold colors.`,
 `Movement was also important. Painters often worked outdoors. This was not normal at the time. Most painters had someone pose for them inside, but the Impressionists went outside. Their subjects were doing something; they were not posing. Blurred lines showed movement. They also paid attention to lighting. Working outside allowed artists to use natural light, which is always changing, along with the change in seasons.`,
 `Impressionist art changed art. It broke the rules. Many people did not like it for this reason. If you ask me, that's what makes it so great. And over time, many people agreed.`

 {q:`How did Impressionist art differ from previous art?`,opts:[`It featured people instead of landscapes.`,`It used new and different blends of colors.`,`It created a three-dimensional effect.`,`It was created outside using natural light.`],ans:3,exp:`Vẽ ngoài trời dùng ánh sáng tự nhiên.`},

 `Since water is the basis of life, composing the greater part of the tissues of all living things, the crucial problem of desert animals is to survive in a world where sources of flowing water are rare. And since man's inexorable necessity is to absorb large quantities of water at frequent intervals, he can scarcely comprehend that many creatures of the desert pass their entire lives without a single drop. Uncompromising as it is, the desert has not eliminated life but only those forms unable to withstand its desiccating effects. No moist-skinned, water-loving animals can exist there.`,
 `Few large animals are found: the giants of the North American desert are the deer, the coyote, and the bobcat. Since desert country is open, it holds more swift-footed, running, and leaping creatures than the tangled forest. Its inhabitants are small, and many of them hunt by stealth. Yet they are not emaciated. Having adapted to their austere environment, they are as healthy as animals anywhere in the world.`,
 `The secret of their adjustment lies in a combination of behavior and physiology. None could survive if, like mad dogs and Englishmen, they went out in the midday sun; many would die in a matter of minutes. So most of them pass the burning hours asleep in cool, humid burrows underneath the ground, emerging to hunt only by night. The surface of the sun-baked desert averages around 150 degrees, but 18 inches down the temperature is only 60 degrees.`,
 `An example of a desert animal that has adapted to subterranean living and lack of water is the kangaroo rat. Like many desert animals, kangaroo rats stay underground during the day. At night, they go out to look for food. Moisture from the air forms on plants and seeds, and kangaroo rats take in the life-giving water as they eat.`

const R8_P3={title:`Passage 3 · Nitrogen fixation`,count:`Q21–30`,type:`shared`,number:true,passage:[
 `Animals and higher-order plants depend on nitrogen that is fixed, or combined with other elements. To enter living systems, nitrogen must be combined with oxygen or hydrogen through a chemical process involving high pressure and high temperature. This process is called nitrogen fixation. Martinus Willem Beijerinck discovered nitrogen fixation.`,
 `The nitrogen molecule is quite inert, and breaking it apart requires a considerable amount of energy. There are three processes that are responsible for most of the nitrogen fixation in the biosphere. They are atmospheric fixation, biological fixation, and industrial fixation. Atmospheric fixation occurs through lightning, forest fires, or even hot lava flows, where energy breaks down nitrogen molecules and enables their atoms to combine with oxygen in the air, thus forming nitrogen oxides. These liquefy in rain, forming nitrates, that are then carried to earth.`,
 `In biological nitrogen fixation, the nitrogen is available to some species of microorganisms. Atmospheric nitrogen is converted to ammonia by bacterial enzymes called nitrogenase. More than 90% of all nitrogen fixation is effected by these nitrogen-fixing microorganisms: free-living (non-symbiotic) bacteria and symbiotic bacteria. Microorganisms that fix nitrogen are called diazotrophs. These need a chemical energy source if they are non-photosynthetic. However, if they are photosynthetic, they can utilize light energy. The free-living diazotrophs supply little fixed nitrogen to agricultural crops, whereas the symbiotic, nitrogen-fixing bacteria live close to plant roots and can obtain energy materials from the plants.`,
 `The symbiotic, nitrogen-fixing bacteria invade the root hairs of plants. Here they multiply and cause the formation of root nodules — enlargements of plant cells and bacteria in close proximity. Within the nodules, the bacteria convert the free nitrogen to nitrates, which the plant makes use of for its development.`,
 `To make certain of sufficient nodule formation and the best possible growth of legumes (beans, clover, peas, soybeans), seeds are inoculated with the appropriate bacteria. <b>This system is the most important for agriculture, as many legumes are then able to grow vigorously under nitrogen-deficient conditions, contributing nitrogen to the farming system or as green manure included in the soil.</b> Legumes are also a significant source of protein, primarily for the developing world.`,
 `Industrial fixation takes place at a temperature of 600 degrees Celsius. In this method, atmospheric nitrogen and hydrogen can be combined to produce ammonia, used as fertilizer. It was during the early 19th century that the importance of fixed nitrogen to growing plants was understood. Where people practiced intensive agriculture, demand arose for nitrogen compounds to augment the natural supply present in the soil.`,
 `Around the same time, Chilean saltpeter was increasingly used to make gunpowder. This led to a global search for natural deposits of this nitrogen compound. Toward the end of the 19th century, it was realized that Chilean imports would not meet future demands, and, in the event of a major war, without the Chilean supply, manufacturing sufficient weapons would not be possible.`,
 `[A] Several processes were then developed: directly combining oxygen with nitrogen, the reaction of nitrogen with calcium carbide, and the direct combination of nitrogen with hydrogen. [B] Combining oxygen and nitrogen was inefficient in its use of energy, so it was abandoned. [C] The Haber-Bosch process is named after Fritz Haber and Carl Bosch, who determined that nitrogen from the air could be combined with hydrogen under enormously high pressures and fairly high temperatures to produce an extremely high quantity of ammonia. [D] Germany heavily relied on this process during World War I, which led to a rapid expansion of the construction of nitrogen plants.`
],items:[

const R8_P4={title:`Passage 4 · Women's suffrage`,count:`Q31–40`,type:`shared`,number:true,passage:[
 `Throughout Western civilization, women's suffrage and the progression of these rights have played a pivotal role in its history. The best example of how these rights have progressed is in two nations that share a common history, Great Britain and the United States of America. [A] In England, the suffrage movement began in 1866 when prominent women's rights reformers gathered over 1,500 signatures on a petition to Parliament appealing for the right to vote. [B] However, significant headway had not been made yet. Women's rights activists soon grew combative and thus made certain that suffrage was a central issue. [C] In America, due to the Civil War, women's suffrage was temporarily halted. However, from 1876, campaigns, referendums, and gatherings were organized and carried out. [D]`,
 `The influence of Great Britain on the United States cannot be understated, yet there are both significant differences and similarities in how suffrage rights have progressed and evolved within each of these nations. In both countries, suffrage was based on class, race, nation, and gender. The suffragists were outside of the political establishment, campaigning alone and without support. They were predominately white and middle class in both countries, and their arguments reflected their class. In the first phase, the arguments for suffrage focused on equality, and then turned to women's contribution to nation building after World War I.`,
 `Feudalism and hereditary rule predated the establishment of limited suffrage in Great Britain. Aspects of this system remained for a significant period of time with only the wealthy and land-owning males allowed to vote. This system was based on the principles that the wealthy would vote in the interests of the nation, just as the monarchy of Britain would rule in the interest of all its subjects.`,
 `English landowners asserted their right to vote based on their personal wealth. Aspects of this trend are clearly evident in America. In 1776, a clause that guaranteed voting rights for white, male landowners was included in the Declaration of Independence. This was identical to the suffrage rights in Great Britain at that time in history. Voting was generally perceived not as a right, but as a privilege that only those who owned land could exercise.`,
 `By 1786, the United States Constitution had been amended to give individual states the power to establish their own suffrage rights. As a result, in 1791, Vermont passed a law declaring that all white males, regardless of whether they possessed property or not, could vote. In contrast, it was not until the Chartist movement in Great Britain in the 1840s that a popular movement had demanded wider suffrage rights. The eventual failure of the Chartist movement in 1850 ensured that only one in every five adult males in England was entitled to vote. While popular suffrage reform stalled in Great Britain, it accelerated in America during this period. In the wake of the American Civil War, the Fifteenth Amendment to the Constitution granted African-American men the right to vote throughout the country. However, just as in England, women remained excluded by law from voting.`,
 `In the aftermath of the First World War, suffrage rights were extended to include women. This change took place first in America in 1920 with the Nineteenth Amendment to the Constitution. It was not until 1928 that voting rights between men and women in Great Britain were equalized. As suffrage rights have extended to include groups formerly excluded, this trend continues in the West. In 1971, a further amendment lowered the age of voting from 21 to 18 in America. Today, in Great Britain and the majority of Western nations, the voting age is 18.`,
 `Initially, the progression of suffrage rights in America mirrored Great Britain's. The wealthy male landowners dominated voting and, therefore, political power, and voted only in their interests. <b>In the wake of the American Civil War and the First World War, suffrage rights were extended to African-Americans, women, and individuals possessing no property, which boosted their status from lower class citizens to a higher level.</b> Today, suffrage, in its universal form, plays a key role in democracies worldwide.`
],items:[

 {tag:`Từ vựng`,q:`The word "progressed" in the passage is closest in meaning to`,opts:[`withheld`,`withstood`,`advanced`,`contained`],ans:2,exp:`“progressed” = tiến triển.`},
 {tag:`Chi tiết`,q:`According to paragraph 2, which of the following was true of the suffragist movement?`,opts:[`Suffragists had a chance to change their position in society.`,`Women achieved their goal of winning full voting rights.`,`It was primarily run by working class women.`,`Most suffragists were moderate in their tactics.`],ans:0,exp:`Phong trào giúp thay đổi vị thế xã hội của họ.`},
 {tag:`Chi tiết`,q:`According to paragraph 4, the United States Declaration of Independence guaranteed`,opts:[`that African Americans could vote`,`that all 21-year olds could vote`,`that women could vote and hold political office`,`that only white, male landowners were allowed to vote`],ans:3,exp:`Chỉ nam giới da trắng có đất mới được bầu.`},
 {tag:`Tham chiếu`,q:`The word "their" in the passage refers to`,opts:[`Englishmen`,`British royalty`,`English landowners`,`American landowners`],ans:2,exp:`“their right to vote” → địa chủ Anh.`},
 {tag:`Mục đích`,q:`Why does the author mention that "Aspects of this trend are clearly evident in America"?`,opts:[`To argue that the right to vote only was exercised by the wealthy and elite`,`To provide evidence that voting was not a right only for those who owned land`,`To show that the right to voting privileges only was granted to wealthy male property holders`,`To support the claim that the right to vote was an attribute of U.S. citizenship`],ans:2,exp:`Cho thấy chỉ nam giới giàu có/có đất mới được bầu.`},
 {tag:`Từ vựng`,q:`The word "stalled" in the passage is closest in meaning to`,opts:[`prevented`,`profited`,`contributed`,`halted`],ans:3,exp:`“stalled” = chững lại/dừng.`},
 {tag:`Suy luận`,q:`Which of the following can be inferred from the passage about the Chartist movement?`,opts:[`Suffrage rights became the standard and expanded to include people of Middle Eastern descent after the Chartist movement failed.`,`The Chartist movement was quashed by a group of hostile forces who were opposed to progression.`,`The Chartist movement helped ensure that only women could vote.`,`The progression of suffrage rights started to slow after the Chartist movement failed.`],ans:3,exp:`Thất bại của phong trào làm cải cách chững lại.`},
 {tag:`Diễn giải`,q:`Which of the following best expresses the essential information in the highlighted sentence?`,opts:[`In the period following the Civil War and World War I, voting rights were extended to most minorities.`,`No one could vote in Great Britain unless they owned land, were white, and could read.`,`War in Europe and America led many countries to disallow people of color the right to vote.`,`Voting has always been considered a privilege in most Western countries.`],ans:0,exp:`Sau nội chiến và Thế chiến I, quyền bầu cử mở rộng cho nhiều nhóm.`},
 {tag:`Chèn câu`,q:`Look at the four squares [ ] that indicate where the following sentence can be added: "American suffragists, however, were not as aggressive as their British counterparts." Where would the sentence best fit?`,opts:[`[A]`,`[B]`,`[C]`,`[D]`],ans:2,exp:`Đặt trước đoạn nói về nước Mỹ → vị trí [C].`}

const W8={id:'w8',name:'Đề 8',full:true,minutes:60,meta:'Thư (bạn cũ Mary ở Oxford) + Luận (tội phạm vị thành niên)',tasks:[
 {label:'Bài 1 · Viết thư',weight:'1/3 điểm',kind:'~120 từ · email trả lời',
  prompt:'Your English-speaking friend Mary, whom you haven’t met for a long time, has sent you an email. She reminds you that you met when you visited her high school in Oxford during your summer trip to England three years ago; asks how you are and what you have been doing (you always wanted to be a teacher); and shares her news that she is studying Law at Oxford University, has changed a lot, now prefers history books to thrillers, and is best friends with Pete (the tall thin guy with glasses) who is on her course. Write a reply to Mary: tell her you still remember her and the time you visited her high school, tell her all your news, and ask her to send your regards to Pete. You should write at least 120 words.',
  model:reveal('Xem bài mẫu', `
   <p>Hi Mary,</p>
   <p>I'm very happy to hear from you again. It's been such a long time. Of course, I still remember you and the time I visited your high school in Oxford. I had lots of nice memories with you and your classmates that summer.</p>
   <p>I'm studying English at Ho Chi Minh City University of Education. I will be a teacher of English after graduation. I also work part-time as a tutor. I love teaching English to children because they look so adorable and seem eager to study another language.</p>
   <p>You know, it's great to tell you that I will have a chance to return to Oxford this summer and definitely see you again there. As the best student of my course at university, I have been awarded a two-week trip to Oxford this June. Just think about what we could do then!</p>
   <p style="margin:0">Please send my best regards to Pete. Keep in touch. <i>(≈156 từ)</i></p>`)},
 {label:'Bài 2 · Viết luận',weight:'2/3 điểm',kind:'~250 từ · Reasons/Solutions',
  prompt:'Levels of youth crime are increasing rapidly in major cities in Viet Nam. What are the reasons for this? Suggest some solutions. Give reasons for your answer and include any relevant examples from your own experience or knowledge. You should write at least 250 words.',
  model:reveal('Xem bài mẫu', `
   <p>Over the last few years, many cities throughout the country have seen a considerable increase in youth crime — a question that not only the authorities but also parents are concerned about. In this essay, I would like to analyse some reasons for this and suggest some possible solutions.</p>
   <p>The causes of this issue lie in the way the youth are brought up and the increasing level of poverty in cities. The first reason is connected with the family. In order for a child to grow up in a balanced way, it is very important that he or she is nurtured with love, care and support. However, these days children are often neglected because many parents are too busy to give their children good advice and support in time. Another factor is the increasing level of poverty: with globalisation, the rich get richer and the poor get poorer, and those born into a poor family who are reluctant to work hard but want to live in comfort may turn to robbing and stealing.</p>
   <p>To solve the problem, we should take several measures on the part of families as well as society. First, parents must spend more time with their children to guide their behaviour and prevent them from making mistakes. Second, those who commit a crime must be dealt with firmly, and the authorities should send young criminals to a rehabilitation centre, where they can learn to behave well and get vocational training so they can find a job later.</p>
   <p>In conclusion, several factors have led to a rise in youth crime, but feasible solutions are available. I'm convinced that the above measures can help reduce youth crime substantially in big cities of Viet Nam. <i>(≈380 từ)</i></p>`)}
]};

const L9_T3={title:`PART 3 · Talk 3`,count:`Q31–35`,type:`shared`,sub:`Bài giảng về nhiếp ảnh gia Berenice Abbott và dự án “Changing New York”.`,passage:[
 `With unemployment rampant in the economic depression of the 1930s, the government established a program to put people to work, called the Works Progress Administration, or WPA. A small subdivision of the WPA, the Federal Arts Project, or FAP, was dedicated to employing artists. The reasoning behind the FAP was that the arts, as much as schools and bridges, contributed to the public welfare. Photographers were uniquely suited to the requirements of the FAP, not least because much of their work constituted documenting the achievements of the WPA.`,
 `One of the photographers funded by the FAP beginning in 1935 was Berenice Abbott. It was perfect timing for her — she'd been photographing New York City since her return from Paris in 1929. Long before the FAP came into being, her stated purpose was to document and interpret America with love, but without sentimentality. She felt that New York represented the essence of the changing nature of American society.`,
 `Abbott and her contemporaries rebelled against the widespread painterly use of soft focus in favor of the sharpness and clarity naturally inherent in photography. They also rejected the sentimentality of typical pastoral scenes and landscapes in favor of a realistic depiction of fast-paced, modern urban life. She called her project "Changing New York", trying to depict the interaction between human beings and solid architectural constructs.`,
 `She decided to use more than just a hand-held camera, which was perfect for capturing the hustle and bustle of the city but would not have done justice to the giant buildings. So she began to use a large format camera, which allowed her to capture the size of massive modern buildings and to juxtapose them with older, humbler ones. To keep the life in her shots, she would wait until someone passed by and make sure they were in the frame, or she would ask people to walk through or stand in the frame. This "Changing New York" collection of 305 photographs is really a remarkable achievement.`,
 `In fact, one more contemporary photographer, Douglas Levere, was so inspired by her work that in the 1990s he decided to re-photograph Abbott's New York photos. Levere went to the same locations, on the same day and same time, with the identical camera Abbott had used, and reframed her shots as exactly as possible. When I first heard about this, I was skeptical of one artist copying another so completely. But then I saw the photographs — and the amazing thing is that they are a logical extension of her work. They take you even deeper into the contrast between the old and the new that Abbott so expertly revealed in the 1930s.`
],items:[
 {q:`What is the focus of the lecture?`,opts:[`Doug Levere's re-photography of Abbott's work`,`Berenice Abbott's Changing New York project`,`Two examples of photography supported by the FAP`,`The effect of the Depression on Berenice Abbott's work`],ans:1,exp:`Trọng tâm là dự án “Changing New York” của Abbott.`},
 {q:`According to the professor, why was Abbott a good candidate for the FAP?`,opts:[`She had already been documenting America.`,`She had a fresh perspective due to her recent return.`,`She was willing to change her approach to fit the FAP.`,`She was a widely recognized figure in the art world.`],ans:0,exp:`Bà đã chụp và ghi lại nước Mỹ từ trước.`},
 {q:`Based on the lecture, what artistic characteristics did Abbott reject in her art?`,opts:[`Modern urban life`,`Depiction of older buildings`,`Meticulous composition`,`Rural settings and landscapes`],ans:3,exp:`Bà từ chối cảnh đồng quê uỷ mị.`},
 {q:`What did Abbott do to "keep the life in her shots"?`,opts:[`Use a hand-held camera`,`Include random people in the frame`,`Frame scenes of urban activity`,`Juxtapose old and new buildings`],ans:1,exp:`Đợi/ mời người đi ngang vào khung hình.`},
 {q:`What is the professor's attitude toward Levere's re-photography of Abbott's work?`,opts:[`Concerned`,`Unimpressed`,`Disappointed`,`Complimentary`],ans:3,exp:`Ban đầu hoài nghi nhưng cuối cùng đánh giá cao.`}

 `The name vaguely embraced the territory west of the Rockies between the northern boundary of Mexican-held California and the southern edge of Russian-held Alaska, which at the time extended south to parallel 54°40'. In 1818, when America proposed a boundary at the 49th parallel — an extension of the border with Canada that already existed east of the Rockies — and the British suggested a line farther south, statesmen of both nations avoided the resulting impasse by agreeing to a joint occupation of the territory.`,
 `But by the early 1840s, the issue could no longer be avoided: Oregon fever and Manifest Destiny had become potent political forces. Though many eastern Americans considered Oregon country too remote to become excited about, demands for its occupation were shouted with almost religious fervor. Senator Thomas Hart Benton, for one, urged Congress to muster "thirty or forty thousand American rifles beyond the Rocky Mountains that will be our effective negotiators."`,
 `The Democratic Party made "54°40' or fight" an issue of the 1844 Presidential election and just managed to install James K. Polk, an ardent expansionist, in the White House. But despite their seeming intransigence, neither Polk nor the British government wanted to fight. And just about the time that Polk learned that the land lying north of the Columbia River was of little value for farming, the British realized that the region was no longer profitable for the dying fur trade. So they quietly settled for the 49th parallel, the boundary that the United States had proposed in the first place.`

 `For all their great diversity of shapes and sizes, glaciers can be divided into two broad categories: valley glaciers, which flow down from mountains and are shaped by the constraints of topography, and ice sheets, which flow outward in all directions from domelike centers of accumulated ice to cover vast expanses of terrain. Whatever their form, all glaciers are made of snow that fell on the earth eons ago. In a few of these glaciers the oldest ice is very ancient indeed; the age of parts of the Antarctic sheet may exceed 500,000 years.`,
 `Glaciers are born in rocky wombs above the snow line, where there is sufficient winter snowfall and summer cold for snow to survive the annual melting. The long gestation period of a glacier begins with the accumulation and gradual transformation of snowflakes. Soon after they reach the ground, complex snowflakes are reduced to compact, roughly spherical ice crystals, the basic units of glacier ice. As new layers of ice crystals, which survive the melting of the previous summer, accumulate, they squeeze out most of the air bubbles trapped within and between the crystals below. This process of recrystallization continues throughout the life of the glacier.`,
 `The length of time required for the creation of glacier ice depends mainly upon the temperature and the rate of snowfall. In Iceland, where snowfall is heavy and summer temperatures are high enough to encourage melting and refreezing, glacier ice may form in a relatively short time — say, ten years. In parts of Antarctica, where snowfall is scant and the ice remains well below its melting temperature year-round, the process may require hundreds of years.`,
 `The ice does not become a glacier until it moves under its own weight, and it cannot move significantly until it reaches a critical thickness that overcomes both the internal strength of the ice and the friction between the ice and the ground. This critical thickness is about 60 feet. The fastest moving glaciers have been gauged at not much more than two and a half miles per year, and some cover less than 1/100 inch in that same amount of time. But no matter how infinitesimal the flow, movement is what distinguishes a glacier from a mere mass of ice.`
],items:[

const R9_P3={title:`Passage 3 · Pottery`,count:`Q21–30`,type:`shared`,number:true,passage:[
 `Pottery refers to dishes, plates, cups and cooking pots made out of clay. Chinese pottery was invented during the Neolithic period. Before this time, people had been nomadic, making it difficult to carry heavy, breakable pieces of pottery. The very early pots were simple lumps of clay. However, people later discovered that heating the clay in a fire made it hard and durable; this technique, known as firing, soon became common practice in pottery production.`,
 `People used pottery as a way of forming their social identity, showing who they were and how they were different from other people. Many of the designs used on pottery were incisions or patterns cut into the clay, and later plants, animals, and human figures — dancers, musicians, and images from everyday life — were painted on.`,
 `[A] Pottery also has roots in ancient China where, for centuries, people produced black, carved, and painted pieces from rough clay. It was in the Sui dynasty, however, that the aesthetics of pottery took a leap forward, and the effect was a stunning, shiny new look and feel for Chinese pottery. [B] These gleaming pieces were prized not only in China, but in West Asia as well. [C] Inevitably, this led to a new market for cheap imitations. [D]`,
 `After 1,200 AD, Chinese potters began using different colored glazes to create designs on their pots. Chinese pottery was still the best and most expensive. After thousands of years of advancements in technique and materials, painted porcelain such as blue and white, tri-color, and under-glazed was successfully produced.`,
 `The Chinese often used pottery as part of the burial ritual. In Chinese culture, jade symbolizes nobility, perfection, and immortality. Jade utensils were laid over the deceased, and some were placed in the mouth or enclosed in the hand. Liquids were placed in the vessels to help the dead in their afterlife and also to aid in funerary ceremonies in which the living communicated with deceased ancestors and gods.`,
 `Pottery can be divided into three groups: those designed for storage, those for preserving or holding liquids, and those for special uses. The Greeks made pottery for many purposes. The custom of burning their dead involved using vases to collect the ashes. Some pottery served as decorative pieces, while others were used for ceremonies or during religious festivals. Amphoras were larger vessels used to store liquids such as water or wine. The Alabastron had special uses such as holding perfume or oil. The Skyphos, a flat-bottomed bowl, was used as a drinking cup.`,
 `Grecian soil had many deposits of clay near rivers. <b>This abundance of raw material was not available to others, giving the Greeks a strategic advantage in manufacturing material.</b> They made full use of clay. Jugs, vases, fruit bowls, and feeding bottles were widely used in homes. Although some larger vessels were made of stone, glass, or metal, clay was by far the most prominent.`,
 `The ancient Egyptians used pottery and ceramic art for burial purposes. Four vases were sometimes deposited with the mummified body, and a large number of vases have been recovered from tombs. They appear to have been valued by the deceased, hence leaving them for burial in the tomb.`
],items:[
