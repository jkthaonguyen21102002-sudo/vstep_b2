const R9_P4={title:`Passage 4 · Louis Pasteur`,count:`Q31–40`,type:`shared`,number:true,passage:[
 `Louis Pasteur was arguably the greatest biologist of the 19th century. His immense contributions were among the most varied and beneficial in the field of science and industry. Pasteur's methods of conducting experiments illustrated brilliance, which started when he studied crystal structure. He observed that tartrate, when created in a laboratory, was different from natural tartrate, because the artificial tartrate is composed of two optically asymmetric crystals. Pasteur succeeded in unraveling the asymmetric crystals from each other and showed that each regained optical activity.`,
 `He then theorized that living organisms only produce molecules that are of one specific type and that these molecules are active. This contradicted the beliefs of Mitscherlich, who had observed only a single type of crystal. Later in his career, Pasteur was approached by the parent of one of his students regarding a contamination problem in alcoholic fermentation. At the time, fermentation leading to the making of wine or beer was thought to be a simple breakdown of sugar. Yeast cells were believed to be either a useful ingredient or simply a product of fermentation.`,
 `The manufacturers of alcohol were having economic problems related to fermentation. Wine would suddenly turn sour or into vinegar, or the quality and taste of beer would suddenly change, so the producers would have to start anew. Pasteur proved that oxygen was not necessary for fermentation to occur. This proved to Justin Von Liebig, who had upheld that fermentation was purely chemical, that he was incorrect.`,
 `Pasteur was able to prove that the yeast was responsible for forming alcohol from sugar and that contaminating microorganisms turned the fermentations sour. Over the years, he segregated the organisms responsible for normal and abnormal fermentations. He demonstrated that if he heated them to mild temperatures, this would kill the microorganisms and prevent souring. He proposed that heating milk to a high temperature before bottling it would prevent souring. This is now known as pasteurization.`,
 `After his research on fermentation, he refuted the principle of spontaneous generation. The theory that maggots, beetles and microbes could arise spontaneously from matter had always been a matter of speculation. In his famous experiment using the 'swan neck flask', fermented juice was put in a flask and, after sterilization, the neck was heated and shaped like the neck of a swan. If the flask was opened, air would enter but dust would get trapped on the inside of the wet neck, and the fluid would still be germ free. If the flask was tipped over, allowing the juice to touch the inside of the neck, microorganisms would grow instantly.`,
 `Pasteur's work with silkworm parasites and germs led to the proposal of the germ theory of disease. <b>After visiting the hospital wards, he became more aware of the infections being spread by physicians from sick patients to the healthy patients.</b> He compelled doctors to disinfect their instruments by boiling and steaming them, and surgeons were told to wash their hands and use disinfectant. At the time, countries were suffering from anthrax, a disease that affects cattle. He believed that if the animals were intentionally infected with a very mild case of the disease, this might be enough to prevent them from getting the disease later on.`,
 `[A] They recovered and, when placed with cattle that did have the disease, did not get sick. [B] Pasteur's next great success was the development of a vaccine against rabies. [C] Institutes were built and people were treated for the disease in them. Pasteur was a national hero in France. [D] He died in 1895 and was given a state funeral.`
],items:[

   <p>Turning to the other side of the argument, most computer games played by children contain a great deal of violence. The problem is that in many games children are rewarded for being more violent, and this violence is repeated again and again. This may lead to increasing aggressive feelings, thoughts and behaviours. Also, if children are absorbed in computer games, they may be distracted from their studies and perform worse at school.</p>

const VR={list:[],idx:0,mode:'flash',topic:'__all__',known:[],unknown:[],wrong:[],score:0};
function vrShuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function vrPool(topic){const out=[];VOCAB_BANK.forEach(([t,tag,words])=>{if(topic==='__all__'||t===topic)words.forEach(([w,p,m])=>out.push({w,p,m,topic:t}));});return out;}
function vrStage(){return document.querySelector('#vocab-review .vr-stage');}
function renderVocabReview(){
  const el=document.getElementById('vocab-review'); if(!el) return;
  const topics=['__all__'].concat(VOCAB_BANK.map(t=>t[0]));
  const chip=(v,lbl,on,attr)=>`<button class="vr-chip${on?' on':''}" ${attr}="${v}">${lbl}</button>`;
  el.innerHTML=`
    <div class="vr-bar"><span class="vr-label">Chủ đề:</span>
      ${topics.map(t=>chip(t,t==='__all__'?'Tất cả':t,t===VR.topic,'data-topic')).join('')}</div>
    <div class="vr-bar"><span class="vr-label">Chế độ:</span>
      ${chip('flash','🎴 Thẻ lật',VR.mode==='flash','data-mode')}
      ${chip('quiz','📝 Trắc nghiệm',VR.mode==='quiz','data-mode')}
      <button class="btn mini" data-vstart style="margin-left:6px">Bắt đầu ôn →</button>
      <span class="vr-count"></span></div>
    <div class="vr-stage"></div>`;
  const upCount=()=>{const n=vrPool(VR.topic).length;el.querySelector('.vr-count').textContent=`${n} từ`;};
  el.querySelectorAll('[data-topic]').forEach(c=>c.onclick=()=>{VR.topic=c.dataset.topic;
    el.querySelectorAll('[data-topic]').forEach(x=>x.classList.toggle('on',x===c));upCount();});
  el.querySelectorAll('[data-mode]').forEach(c=>c.onclick=()=>{VR.mode=c.dataset.mode;
    el.querySelectorAll('[data-mode]').forEach(x=>x.classList.toggle('on',x===c));});
  el.querySelector('[data-vstart]').onclick=()=>vrStart();
  upCount();
}
function vrStart(list){
  VR.list=list||vrShuffle(vrPool(VR.topic)); VR.idx=0; VR.known=[]; VR.unknown=[]; VR.wrong=[]; VR.score=0;
  if(!VR.list.length){vrStage().innerHTML='<p style="color:var(--ink-soft)">Chưa có từ nào trong chủ đề này.</p>';return;}
  VR.mode==='quiz'?vrQuiz():vrFlash();
}
function vrFlash(){
  const it=VR.list[VR.idx], st=vrStage();
  st.innerHTML=`<div class="vr-progress">Thẻ ${VR.idx+1}/${VR.list.length} · ✅ ${VR.known.length} · ❌ ${VR.unknown.length}</div>
    <div class="vr-card" data-flip><span class="vr-topic">${it.topic}</span>
      <div class="vr-word">${it.w}</div><div class="vr-pos">${it.p}</div>
      <div class="vr-hint">👆 Bấm vào thẻ để xem nghĩa</div>
      <div class="vr-meaning" style="display:none">${it.m}</div></div>
    <div class="vr-actions">
      <button class="btn ghost" data-mark="0">❌ Chưa thuộc</button>
      <button class="btn" data-mark="1">✅ Đã thuộc</button></div>
    <button class="vr-reset" data-vback>↺ Chọn lại chủ đề / chế độ</button>`;
  const card=st.querySelector('[data-flip]');
  card.onclick=()=>{const m=card.querySelector('.vr-meaning'),h=card.querySelector('.vr-hint');
    if(m.style.display==='none'){m.style.display='';h.style.display='none';}};
  st.querySelectorAll('[data-mark]').forEach(b=>b.onclick=()=>{
    (b.dataset.mark==='1'?VR.known:VR.unknown).push(it); VR.idx++;
    VR.idx>=VR.list.length?vrSummary():vrFlash();});
  st.querySelector('[data-vback]').onclick=renderVocabReview;
}
function vrQuiz(){
  const it=VR.list[VR.idx], st=vrStage(), pool=vrPool(VR.topic);
  const distract=vrShuffle(pool.filter(x=>x.m!==it.m)).slice(0,3).map(x=>x.m);
  const opts=vrShuffle([it.m].concat(distract));
  st.innerHTML=`<div class="vr-progress">Câu ${VR.idx+1}/${VR.list.length} · Điểm: ${VR.score}</div>
    <div class="vr-q">Nghĩa của từ này là gì?</div>
    <div class="vr-qword">${it.w} <span class="vr-pos">${it.p}</span></div>
    <div class="vr-opts">${opts.map(o=>`<button class="vr-opt" data-m="${encodeURIComponent(o)}">${o}</button>`).join('')}</div>
    <button class="vr-reset" data-vback>↺ Chọn lại chủ đề / chế độ</button>`;
  let answered=false;
  st.querySelectorAll('.vr-opt').forEach(b=>b.onclick=()=>{
    if(answered)return; answered=true;
    const chosen=decodeURIComponent(b.dataset.m), ok=chosen===it.m;
    st.querySelectorAll('.vr-opt').forEach(x=>{x.disabled=true;
      const v=decodeURIComponent(x.dataset.m);
      if(v===it.m)x.classList.add('correct'); else if(x===b)x.classList.add('wrong');});
    if(ok)VR.score++; else VR.wrong.push(it);
    const nx=document.createElement('button'); nx.className='btn'; nx.style.marginTop='12px';
    nx.textContent=VR.idx+1>=VR.list.length?'Xem kết quả →':'Câu tiếp →';
    nx.onclick=()=>{VR.idx++; VR.idx>=VR.list.length?vrSummary():vrQuiz();};
    st.querySelector('.vr-opts').after(nx);
  });
  st.querySelector('[data-vback]').onclick=renderVocabReview;
}
function vrSummary(){
  const st=vrStage(), total=VR.list.length;
  if(VR.mode==='quiz'){
    const pct=Math.round(VR.score/total*100);
    st.innerHTML=`<div class="vr-summary"><div style="font-size:1.5rem">${pct>=80?'🎉':pct>=50?'👍':'💪'}</div>
      <div class="vs-score">${VR.score}/${total}</div>
      <div style="color:var(--ink-soft);margin:6px 0 14px">Đúng ${pct}% · sai ${VR.wrong.length} từ</div>
      <div class="vr-actions">
        ${VR.wrong.length?`<button class="btn" data-vagain>📝 Làm lại ${VR.wrong.length} từ sai</button>`:''}
        <button class="btn ghost" data-vrestart>↻ Làm lại từ đầu</button>
        <button class="btn ghost" data-vback>Đổi chủ đề/chế độ</button></div></div>`;
    if(VR.wrong.length) st.querySelector('[data-vagain]').onclick=()=>vrStart(vrShuffle(VR.wrong));
  } else {
    st.innerHTML=`<div class="vr-summary"><div style="font-size:1.5rem">${VR.unknown.length===0?'🎉':'💪'}</div>
      <div class="vs-score">✅ ${VR.known.length} / ${total}</div>
      <div style="color:var(--ink-soft);margin:6px 0 14px">Đã thuộc ${VR.known.length} · chưa thuộc ${VR.unknown.length}</div>
      <div class="vr-actions">
        ${VR.unknown.length?`<button class="btn" data-vagain>🎴 Ôn lại ${VR.unknown.length} từ chưa thuộc</button>`:''}
        <button class="btn ghost" data-vrestart>↻ Ôn lại từ đầu</button>
        <button class="btn ghost" data-vback>Đổi chủ đề/chế độ</button></div></div>`;
    if(VR.unknown.length) st.querySelector('[data-vagain]').onclick=()=>vrStart(vrShuffle(VR.unknown));
  }
  st.querySelector('[data-vrestart]').onclick=()=>vrStart();
  st.querySelector('[data-vback]').onclick=renderVocabReview;
}

/* ================= KHỞI TẠO BỘ CHỌN ĐỀ ================= */
renderVocab();
renderVocabReview();
initDeck('deck-nghe','test-nghe', LISTENING_TESTS, renderMCQTest);
initDeck('deck-doc','test-doc', READING_TESTS, renderMCQTest);
initDeck('deck-noi','test-noi', SPEAKING_TESTS, renderSpeakingTest);
initDeck('deck-viet','test-viet', WRITING_TESTS, renderWritingTest);

</script>
